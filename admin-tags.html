<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ProCraft Admin — Tags</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold:       #C9A84C;
      --green-dark: #0E1F16;
      --green-mid:  #1A3626;
      --cream:      #F5F2EC;
      --text:       #2C3A32;
      --muted:      #7A8C82;
      --border:     #DDD8CC;
      --white:      #FFFFFF;
      --error:      #C0392B;
    }
    html, body { min-height: 100%; font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--text); }

    .navbar { background: var(--green-dark); padding: 0 24px; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .nav-brand { display: flex; align-items: center; gap: 10px; }
    .nav-logo { width: 32px; height: 32px; background: rgba(201,168,76,0.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .nav-logo svg { width: 14px; height: 14px; fill: var(--gold); }
    .nav-title { font-family: 'Cormorant Garamond', serif; font-size: 17px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: #fff; }
    .nav-badge { font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; background: var(--gold); color: var(--green-dark); padding: 2px 7px; border-radius: 2px; font-weight: 500; }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    .nav-link { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.5); text-decoration: none; transition: color 0.2s; }
    .nav-link:hover, .nav-link.active { color: #fff; }
    .nav-logout { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.5); cursor: pointer; border: 1px solid rgba(255,255,255,0.15); border-radius: 3px; padding: 6px 12px; background: transparent; transition: color 0.2s, border-color 0.2s; }
    .nav-logout:hover { color: #fff; border-color: rgba(255,255,255,0.4); }

    .page { max-width: 1100px; margin: 0 auto; padding: 32px 20px; }
    .page-header { margin-bottom: 24px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
    .page-title { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 400; color: var(--green-dark); }

    .layout { display: grid; grid-template-columns: 320px 1fr; gap: 20px; align-items: start; }
    @media (max-width: 768px) { .layout { grid-template-columns: 1fr; } }

    .panel { background: var(--white); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
    .panel-header { padding: 14px 20px; border-bottom: 1px solid var(--border); background: #FAFAF8; display: flex; align-items: center; justify-content: space-between; }
    .panel-title { font-size: 10px; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; color: var(--green-dark); }

    /* Tag creation */
    .tag-create { padding: 16px 20px; border-bottom: 1px solid var(--border); display: flex; gap: 8px; align-items: center; }
    .tag-name-input { flex: 1; height: 36px; border: 1px solid var(--border); border-radius: 3px; padding: 0 10px; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--text); }
    .tag-name-input:focus { outline: none; border-color: var(--gold); }
    .tag-color-input { width: 36px; height: 36px; border: 1px solid var(--border); border-radius: 3px; padding: 2px; cursor: pointer; }
    .btn-add-tag { height: 36px; background: var(--green-dark); color: #fff; border: none; border-radius: 3px; padding: 0 14px; font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; white-space: nowrap; }
    .btn-add-tag:hover { background: var(--green-mid); }

    /* Tag list */
    .tag-item { padding: 12px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; cursor: pointer; transition: background 0.15s; }
    .tag-item:last-child { border-bottom: none; }
    .tag-item:hover { background: #FAFAF8; }
    .tag-item.active { background: rgba(14,31,22,0.04); }
    .tag-pill { display: inline-flex; align-items: center; gap: 6px; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; }
    .tag-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .tag-count { font-size: 10px; color: var(--muted); }
    .btn-del-tag { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 16px; padding: 2px 6px; border-radius: 3px; transition: color 0.2s; }
    .btn-del-tag:hover { color: var(--error); }

    /* Right panel */
    .right-panel-empty { padding: 60px 20px; text-align: center; color: var(--muted); font-size: 13px; }
    .right-panel-empty svg { width: 36px; height: 36px; fill: var(--border); margin: 0 auto 12px; display: block; }

    /* Dealer checkboxes */
    .dealer-search { padding: 12px 20px; border-bottom: 1px solid var(--border); }
    .dealer-search input { width: 100%; height: 34px; border: 1px solid var(--border); border-radius: 3px; padding: 0 10px; font-family: 'DM Sans', sans-serif; font-size: 12px; }
    .dealer-search input:focus { outline: none; border-color: var(--gold); }

    .dealer-list { max-height: 320px; overflow-y: auto; }
    .dealer-check-item { padding: 10px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; cursor: pointer; transition: background 0.15s; }
    .dealer-check-item:last-child { border-bottom: none; }
    .dealer-check-item:hover { background: #FAFAF8; }
    .dealer-check-item input[type="checkbox"] { width: 15px; height: 15px; accent-color: var(--green-dark); cursor: pointer; flex-shrink: 0; }
    .dealer-check-name { font-size: 13px; font-weight: 500; color: var(--green-dark); }
    .dealer-check-sub { font-size: 11px; color: var(--muted); }

    .panel-actions { padding: 14px 20px; border-top: 1px solid var(--border); display: flex; gap: 8px; flex-wrap: wrap; }
    .btn-action { height: 34px; border: none; border-radius: 3px; padding: 0 14px; font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: background 0.2s; }
    .btn-save-tags { background: var(--green-dark); color: #fff; }
    .btn-save-tags:hover { background: var(--green-mid); }
    .btn-bulk-edit { background: rgba(201,168,76,0.15); color: #8B6914; }
    .btn-bulk-edit:hover { background: rgba(201,168,76,0.25); }

    /* Bulk edit section */
    .bulk-edit { padding: 16px 20px; border-top: 1px solid var(--border); background: #FAFAF8; display: none; }
    .bulk-edit.show { display: block; }
    .bulk-edit-title { font-size: 10px; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-bottom: 12px; }
    .bulk-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
    .bulk-group { display: flex; flex-direction: column; gap: 4px; }
    .bulk-label { font-size: 9px; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); }
    .bulk-input { height: 34px; border: 1px solid var(--border); border-radius: 3px; padding: 0 10px; font-family: 'DM Sans', sans-serif; font-size: 12px; color: var(--text); }
    .bulk-input:focus { outline: none; border-color: var(--gold); }
    .bulk-hint { font-size: 10px; color: var(--muted); }
    .bulk-checkbox-row { display: flex; align-items: center; gap: 6px; margin-bottom: 10px; }
    .bulk-checkbox-row input { accent-color: var(--green-dark); }
    .bulk-checkbox-row label { font-size: 12px; }
    .btn-apply-bulk { height: 34px; background: var(--error); color: #fff; border: none; border-radius: 3px; padding: 0 16px; font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 500; letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; }

    .empty-state { padding: 30px 20px; text-align: center; color: var(--muted); font-size: 12px; }

    .loading-rows { padding: 16px 20px; }
    .loading-row { height: 14px; background: linear-gradient(90deg, #eee 25%, #f5f5f5 50%, #eee 75%); background-size: 200% 100%; animation: shimmer 1.2s infinite; border-radius: 3px; margin-bottom: 10px; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

    .toast { position: fixed; bottom: 24px; right: 24px; background: var(--green-dark); color: #fff; padding: 12px 20px; border-radius: 4px; font-size: 12px; z-index: 999; display: none; }
    .toast.show { display: block; }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="nav-brand">
    <div class="nav-logo"><svg viewBox="0 0 24 24"><path d="M12 2L3 7v10l9 5 9-5V7L12 2zm0 2.18L19 8v8l-7 3.88L5 16V8l7-3.82z"/></svg></div>
    <span class="nav-title">ProCraft</span>
    <span class="nav-badge">Admin</span>
  </div>
  <div class="nav-right">
    <a href="admin.html" class="nav-link">Dashboard</a>
    <a href="admin-quotes.html" class="nav-link">Quotes</a>
    <a href="admin-dealers.html" class="nav-link">Dealers</a>
    <a href="admin-accounts.html" class="nav-link">Accounts</a>
    <a href="admin-tags.html" class="nav-link active">Tags</a>
    <a href="change-password.html" class="nav-link">Change Password</a>
    <button class="nav-logout" onclick="handleLogout()">Sign Out</button>
  </div>
</nav>

<div class="page">
  <div class="page-header">
    <div class="page-title">Tags</div>
  </div>

  <div class="layout">
    <!-- Left: Tag list -->
    <div>
      <div class="panel">
        <div class="panel-header">
          <span class="panel-title">All Tags</span>
        </div>
        <div class="tag-create">
          <input class="tag-name-input" id="newTagName" type="text" placeholder="Tag name..." maxlength="30"/>
          <input class="tag-color-input" id="newTagColor" type="color" value="#C9A84C"/>
          <button class="btn-add-tag" onclick="createTag()">Add</button>
        </div>
        <div id="tagList">
          <div class="loading-rows"><div class="loading-row"></div><div class="loading-row"></div></div>
        </div>
      </div>
    </div>

    <!-- Right: Tag detail -->
    <div class="panel" id="rightPanel">
      <div class="right-panel-empty">
        <svg viewBox="0 0 24 24"><path d="M21.41 11.58l-9-9C12.05 2.22 11.55 2 11 2H4c-1.1 0-2 .9-2 2v7c0 .55.22 1.05.59 1.42l9 9c.36.36.86.58 1.41.58.55 0 1.05-.22 1.41-.59l7-7c.37-.36.59-.86.59-1.41 0-.55-.23-1.06-.59-1.42zM5.5 7C4.67 7 4 6.33 4 5.5S4.67 4 5.5 4 7 4.67 7 5.5 6.33 7 5.5 7z"/></svg>
        Select a tag to manage dealers
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const { createClient } = window.supabase;
const _supabase = createClient(
  'https://acwgemgpnusworpxxoai.supabase.co',
  'sb_publishable_GYx1PEpxNJ9dj5V3WYpPWQ_8YfB0w8M'
);

let allTags    = [];
let allDealers = [];
let selectedTag = null;

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

async function init() {
  const { data: { session } } = await _supabase.auth.getSession();
  if (!session) { window.location.href = 'login.html'; return; }
  const { data: me } = await _supabase.from('dealers').select('role').eq('id', session.user.id).single();
  if (!['admin','super_admin'].includes(me?.role)) { window.location.href = 'dashboard.html'; return; }

  await Promise.all([loadTags(), loadDealers()]);
}

async function loadTags() {
  const { data: tags } = await _supabase.from('tags').select('*, dealer_tags(dealer_id)').order('name');
  allTags = tags || [];
  renderTagList();
}

async function loadDealers() {
  const { data: dealers } = await _supabase
    .from('dealers')
    .select('id, company_name, contact_name')
    .eq('is_active', true)
    .not('role', 'in', '("admin","super_admin")')
    .order('company_name');
  allDealers = dealers || [];
}

function renderTagList() {
  const el = document.getElementById('tagList');
  if (!allTags.length) {
    el.innerHTML = `<div class="empty-state">No tags yet. Create one above.</div>`;
    return;
  }
  el.innerHTML = allTags.map(tag => `
    <div class="tag-item ${selectedTag?.id === tag.id ? 'active' : ''}" onclick="selectTag('${tag.id}')">
      <div style="display:flex;align-items:center;gap:8px;">
        <span class="tag-pill" style="background:${tag.color}22;color:${tag.color};">
          <span class="tag-dot" style="background:${tag.color};"></span>
          ${tag.name}
        </span>
        <span class="tag-count">${tag.dealer_tags?.length || 0} dealers</span>
      </div>
      <button class="btn-del-tag" onclick="event.stopPropagation();deleteTag('${tag.id}','${tag.name}')">×</button>
    </div>`).join('');
}

async function createTag() {
  const name  = document.getElementById('newTagName').value.trim();
  const color = document.getElementById('newTagColor').value;
  if (!name) return;

  const { error } = await _supabase.from('tags').insert({ name, color });
  if (error) { showToast('Error: ' + (error.message.includes('unique') ? 'Tag already exists.' : error.message)); return; }

  document.getElementById('newTagName').value = '';
  showToast(`Tag "${name}" created.`);
  await loadTags();
}

async function deleteTag(tagId, tagName) {
  if (!confirm(`Delete tag "${tagName}"? This will remove it from all dealers.`)) return;
  const { error } = await _supabase.from('tags').delete().eq('id', tagId);
  if (error) { showToast('Error: ' + error.message); return; }
  if (selectedTag?.id === tagId) {
    selectedTag = null;
    document.getElementById('rightPanel').innerHTML = `<div class="right-panel-empty"><svg viewBox="0 0 24 24"><path d="M21.41 11.58l-9-9C12.05 2.22 11.55 2 11 2H4c-1.1 0-2 .9-2 2v7c0 .55.22 1.05.59 1.42l9 9c.36.36.86.58 1.41.58.55 0 1.05-.22 1.41-.59l7-7c.37-.36.59-.86.59-1.41 0-.55-.23-1.06-.59-1.42zM5.5 7C4.67 7 4 6.33 4 5.5S4.67 4 5.5 4 7 4.67 7 5.5 6.33 7 5.5 7z"/></svg>Select a tag to manage dealers</div>`;
  }
  showToast(`Tag "${tagName}" deleted.`);
  await loadTags();
}

async function selectTag(tagId) {
  selectedTag = allTags.find(t => t.id === tagId);
  renderTagList();

  // Load current dealers for this tag
  const { data: taggedDealers } = await _supabase
    .from('dealer_tags')
    .select('dealer_id')
    .eq('tag_id', tagId);

  const taggedIds = new Set((taggedDealers || []).map(d => d.dealer_id));

  const rightPanel = document.getElementById('rightPanel');
  rightPanel.innerHTML = `
    <div class="panel-header">
      <span class="panel-title">
        <span class="tag-pill" style="background:${selectedTag.color}22;color:${selectedTag.color};">
          <span class="tag-dot" style="background:${selectedTag.color};"></span>
          ${selectedTag.name}
        </span>
      </span>
      <span style="font-size:11px;color:var(--muted);">${taggedIds.size} dealers</span>
    </div>
    <div class="dealer-search">
      <input type="text" placeholder="Search dealers..." oninput="filterDealers(this.value)"/>
    </div>
    <div class="dealer-list" id="dealerCheckList"></div>
    <div class="panel-actions">
      <button class="btn-action btn-save-tags" onclick="saveDealerTags()">Save Tags</button>
      <button class="btn-action btn-bulk-edit" onclick="toggleBulkEdit()">Bulk Edit Pricing</button>
    </div>
    <div class="bulk-edit" id="bulkEditSection">
      <div class="bulk-edit-title">Batch Update — applies to all checked dealers</div>
      <div class="bulk-fields">
        <div class="bulk-group">
          <label class="bulk-label">Multiplier</label>
          <input class="bulk-input" type="number" id="bulkMultiplier" step="0.01" min="1" placeholder="e.g. 1.30"/>
          <span class="bulk-hint">Leave blank to skip</span>
        </div>
        <div class="bulk-group">
          <label class="bulk-label">Tax Rate (%)</label>
          <input class="bulk-input" type="number" id="bulkTaxRate" step="0.1" min="0" max="20" placeholder="e.g. 6"/>
          <span class="bulk-hint">Leave blank to skip</span>
        </div>
      </div>
      <div class="bulk-checkbox-row">
        <input type="checkbox" id="bulkTaxExempt"/>
        <label for="bulkTaxExempt">Set all as Tax Exempt</label>
      </div>
      <button class="btn-apply-bulk" onclick="applyBulkEdit()">Apply to Checked Dealers</button>
    </div>`;

  renderDealerChecklist(taggedIds);
}

function renderDealerChecklist(taggedIds, filter = '') {
  const el = document.getElementById('dealerCheckList');
  if (!el) return;
  const filtered = filter
    ? allDealers.filter(d => d.company_name.toLowerCase().includes(filter.toLowerCase()))
    : allDealers;

  if (!filtered.length) {
    el.innerHTML = `<div class="empty-state">No dealers found.</div>`;
    return;
  }

  el.innerHTML = filtered.map(d => `
    <label class="dealer-check-item">
      <input type="checkbox" value="${d.id}" ${taggedIds?.has(d.id) ? 'checked' : ''}/>
      <div>
        <div class="dealer-check-name">${d.company_name}</div>
        <div class="dealer-check-sub">${d.contact_name}</div>
      </div>
    </label>`).join('');
}

function filterDealers(val) {
  // Re-get current checked state
  const checked = new Set(
    [...document.querySelectorAll('#dealerCheckList input[type="checkbox"]:checked')].map(c => c.value)
  );
  renderDealerChecklist(checked, val);
  // Re-check previously checked
  document.querySelectorAll('#dealerCheckList input[type="checkbox"]').forEach(cb => {
    if (checked.has(cb.value)) cb.checked = true;
  });
}

function toggleBulkEdit() {
  const el = document.getElementById('bulkEditSection');
  el.classList.toggle('show');
}

async function saveDealerTags() {
  if (!selectedTag) return;
  const checked = [...document.querySelectorAll('#dealerCheckList input[type="checkbox"]:checked')].map(c => c.value);

  // Delete all existing dealer_tags for this tag
  await _supabase.from('dealer_tags').delete().eq('tag_id', selectedTag.id);

  // Insert new ones
  if (checked.length) {
    await _supabase.from('dealer_tags').insert(checked.map(dealer_id => ({ dealer_id, tag_id: selectedTag.id })));
  }

  showToast(`Tag "${selectedTag.name}" updated — ${checked.length} dealers.`);
  await loadTags();
  await selectTag(selectedTag.id);
}

async function applyBulkEdit() {
  const checked = [...document.querySelectorAll('#dealerCheckList input[type="checkbox"]:checked')].map(c => c.value);
  if (!checked.length) { showToast('No dealers selected.'); return; }

  const multiplier  = document.getElementById('bulkMultiplier').value;
  const taxRate     = document.getElementById('bulkTaxRate').value;
  const taxExempt   = document.getElementById('bulkTaxExempt').checked;

  const updates = {};
  if (multiplier) updates.multiplier = parseFloat(multiplier);
  if (taxRate)    updates.tax_rate   = parseFloat(taxRate) / 100;
  if (taxExempt)  updates.tax_exempt = true;

  if (!Object.keys(updates).length) { showToast('No changes to apply.'); return; }

  if (!confirm(`Apply pricing changes to ${checked.length} dealer(s)? This cannot be undone.`)) return;

  const { error } = await _supabase.from('dealers').update(updates).in('id', checked);
  if (error) { showToast('Error: ' + error.message); return; }

  showToast(`Pricing updated for ${checked.length} dealer(s).`);
}

async function handleLogout() {
  await _supabase.auth.signOut();
  window.location.href = 'login.html';
}

init();
</script>
</body>
</html>
