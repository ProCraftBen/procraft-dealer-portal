<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ProCraft — Change Password</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold:       #C9A84C;
      --green-dark: #0E1F16;
      --green-mid:  #1A3626;
      --cream:      #F5F2EC;
      --text:       #2C3A32;
      --muted:      #7A8C82;
      --border:     #DDD8CC;
      --white:      #FFFFFF;
      --error:      #C0392B;
      --success:    #16A34A;
    }
    html, body { min-height: 100%; font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--text); }

    /* Navbar */
    .navbar { background: var(--green-dark); padding: 0 24px; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .nav-brand { display: flex; align-items: center; gap: 10px; }
    .nav-logo { width: 32px; height: 32px; background: rgba(201,168,76,0.15); border-radius: 50%; display: flex; align-items: center; justify-content: center; }
    .nav-logo svg { width: 14px; height: 14px; fill: var(--gold); }
    .nav-title { font-family: 'Cormorant Garamond', serif; font-size: 17px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: #fff; }
    .nav-right { display: flex; align-items: center; gap: 12px; }
    .nav-back { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.5); border: 1px solid rgba(255,255,255,0.15); border-radius: 3px; padding: 6px 12px; text-decoration: none; transition: color 0.2s, border-color 0.2s; }
    .nav-back:hover { color: #fff; border-color: rgba(255,255,255,0.4); }
    .nav-logout { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.5); cursor: pointer; border: 1px solid rgba(255,255,255,0.15); border-radius: 3px; padding: 6px 12px; background: transparent; transition: color 0.2s, border-color 0.2s; }
    .nav-logout:hover { color: #fff; border-color: rgba(255,255,255,0.4); }

    /* Page */
    .page { max-width: 480px; margin: 0 auto; padding: 60px 20px; }
    .page-title { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 400; color: var(--green-dark); margin-bottom: 8px; }
    .page-sub { font-size: 13px; color: var(--muted); margin-bottom: 32px; line-height: 1.6; }

    /* Card */
    .card { background: var(--white); border: 1px solid var(--border); border-radius: 4px; padding: 28px; }

    /* Form */
    .form-group { margin-bottom: 20px; }
    .form-label { font-size: 9px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); display: block; margin-bottom: 6px; }
    .input-wrap { position: relative; }
    .form-input { width: 100%; height: 44px; border: 1px solid var(--border); border-radius: 3px; padding: 0 44px 0 14px; font-family: 'DM Sans', sans-serif; font-size: 13px; color: var(--text); background: var(--white); transition: border-color 0.2s; }
    .form-input:focus { outline: none; border-color: var(--gold); }
    .toggle-pw { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: var(--muted); padding: 4px; transition: color 0.2s; }
    .toggle-pw:hover { color: var(--text); }
    .toggle-pw svg { width: 16px; height: 16px; fill: currentColor; display: block; }

    /* Password strength */
    .pw-strength { margin-top: 8px; }
    .pw-bars { display: flex; gap: 4px; margin-bottom: 4px; }
    .pw-bar { flex: 1; height: 3px; background: var(--border); border-radius: 2px; transition: background 0.2s; }
    .pw-bar.weak   { background: #E74C3C; }
    .pw-bar.fair   { background: #F39C12; }
    .pw-bar.good   { background: #3B82F6; }
    .pw-bar.strong { background: var(--success); }
    .pw-label { font-size: 10px; color: var(--muted); }

    /* Rules */
    .pw-rules { margin-top: 10px; display: flex; flex-direction: column; gap: 4px; }
    .pw-rule { font-size: 11px; color: var(--muted); display: flex; align-items: center; gap: 6px; transition: color 0.2s; }
    .pw-rule.met { color: var(--success); }
    .pw-rule svg { width: 12px; height: 12px; fill: currentColor; flex-shrink: 0; }

    /* Messages */
    .error-msg { background: rgba(192,57,43,0.07); border: 1px solid rgba(192,57,43,0.25); border-radius: 3px; padding: 10px 14px; font-size: 12px; color: var(--error); margin-bottom: 16px; display: none; }
    .error-msg.show { display: block; }
    .success-msg { background: rgba(22,163,74,0.07); border: 1px solid rgba(22,163,74,0.25); border-radius: 3px; padding: 14px; font-size: 13px; color: var(--success); text-align: center; display: none; }
    .success-msg.show { display: block; }

    /* Button */
    .btn-submit { width: 100%; height: 48px; background: var(--green-dark); color: #fff; border: none; border-radius: 3px; font-family: 'DM Sans', sans-serif; font-size: 12px; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; transition: background 0.2s; margin-top: 8px; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-submit:hover { background: var(--green-mid); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; }
    .spinner { width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3); border-top-color: #fff; border-radius: 50%; animation: spin 0.7s linear infinite; display: none; }
    .btn-submit.loading .btn-text { display: none; }
    .btn-submit.loading .spinner { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="nav-brand">
    <div class="nav-logo"><svg viewBox="0 0 24 24"><path d="M12 2L3 7v10l9 5 9-5V7L12 2zm0 2.18L19 8v8l-7 3.88L5 16V8l7-3.82z"/></svg></div>
    <span class="nav-title">ProCraft</span>
  </div>
  <div class="nav-right">
    <a href="#" class="nav-back" id="navBack">← Back</a>
    <button class="nav-logout" onclick="handleLogout()">Sign Out</button>
  </div>
</nav>

<div class="page">
  <div class="page-title">Change Password</div>
  <div class="page-sub">Enter your current password and choose a new one.</div>

  <div class="card">
    <div class="error-msg" id="errorMsg"></div>
    <div class="success-msg" id="successMsg">
      ✓ Password updated successfully. Redirecting to dashboard...
    </div>

    <div id="formContent">
      <!-- Current Password -->
      <div class="form-group">
        <label class="form-label">Current Password</label>
        <div class="input-wrap">
          <input class="form-input" type="password" id="currentPw" placeholder="Enter current password"/>
          <button class="toggle-pw" type="button" onclick="toggleVisibility('currentPw', this)">
            <svg id="eye-currentPw" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
          </button>
        </div>
      </div>

      <!-- New Password -->
      <div class="form-group">
        <label class="form-label">New Password</label>
        <div class="input-wrap">
          <input class="form-input" type="password" id="newPw" placeholder="Enter new password" oninput="checkStrength()"/>
          <button class="toggle-pw" type="button" onclick="toggleVisibility('newPw', this)">
            <svg id="eye-newPw" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
          </button>
        </div>
        <div class="pw-strength" id="pwStrength" style="display:none;">
          <div class="pw-bars">
            <div class="pw-bar" id="bar1"></div>
            <div class="pw-bar" id="bar2"></div>
            <div class="pw-bar" id="bar3"></div>
            <div class="pw-bar" id="bar4"></div>
          </div>
          <div class="pw-label" id="pwLabel"></div>
        </div>
        <div class="pw-rules">
          <div class="pw-rule" id="rule-len">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
            At least 8 characters
          </div>
          <div class="pw-rule" id="rule-upper">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
            One uppercase letter
          </div>
          <div class="pw-rule" id="rule-num">
            <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>
            One number
          </div>
        </div>
      </div>

      <!-- Confirm Password -->
      <div class="form-group">
        <label class="form-label">Confirm New Password</label>
        <div class="input-wrap">
          <input class="form-input" type="password" id="confirmPw" placeholder="Repeat new password"/>
          <button class="toggle-pw" type="button" onclick="toggleVisibility('confirmPw', this)">
            <svg id="eye-confirmPw" viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
          </button>
        </div>
      </div>

      <button class="btn-submit" id="btnSubmit" onclick="changePassword()">
        <span class="btn-text">Update Password</span>
        <div class="spinner"></div>
      </button>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const { createClient } = window.supabase;
const _supabase = createClient(
  'https://acwgemgpnusworpxxoai.supabase.co',
  'sb_publishable_GYx1PEpxNJ9dj5V3WYpPWQ_8YfB0w8M'
);

let currentUserRole = null;

async function init() {
  const { data: { session } } = await _supabase.auth.getSession();
  if (!session) { window.location.href = 'login.html'; return; }

  const { data: me } = await _supabase
    .from('dealers')
    .select('role')
    .eq('id', session.user.id)
    .single();

  currentUserRole = me?.role || 'dealer';

  const navBack = document.getElementById('navBack');
  if (navBack) {
    const isAdmin = ['admin', 'super_admin'].includes(currentUserRole);
    navBack.href = isAdmin ? 'admin.html' : 'dashboard.html';
    navBack.textContent = isAdmin ? '← Admin' : '← Dashboard';
  }
}

function toggleVisibility(inputId, btn) {
  const input = document.getElementById(inputId);
  const isText = input.type === 'text';
  input.type = isText ? 'password' : 'text';
  btn.querySelector('svg').innerHTML = isText
    ? '<path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/>'
    : '<path d="M12 7c2.76 0 5 2.24 5 5 0 .65-.13 1.26-.36 1.83l2.92 2.92c1.51-1.26 2.7-2.89 3.43-4.75-1.73-4.39-6-7.5-11-7.5-1.4 0-2.74.25-3.98.7l2.16 2.16C10.74 7.13 11.35 7 12 7zM2 4.27l2.28 2.28.46.46C3.08 8.3 1.78 10.02 1 12c1.73 4.39 6 7.5 11 7.5 1.55 0 3.03-.3 4.38-.84l.42.42L19.73 22 21 20.73 3.27 3 2 4.27zM7.53 9.8l1.55 1.55c-.05.21-.08.43-.08.65 0 1.66 1.34 3 3 3 .22 0 .44-.03.65-.08l1.55 1.55c-.67.33-1.41.53-2.2.53-2.76 0-5-2.24-5-5 0-.79.2-1.53.53-2.2zm4.31-.78l3.15 3.15.02-.16c0-1.66-1.34-3-3-3l-.17.01z"/>';
}

function checkStrength() {
  const pw = document.getElementById('newPw').value;
  const strengthEl = document.getElementById('pwStrength');

  if (!pw) { strengthEl.style.display = 'none'; return; }
  strengthEl.style.display = 'block';

  const hasLen   = pw.length >= 8;
  const hasUpper = /[A-Z]/.test(pw);
  const hasNum   = /[0-9]/.test(pw);
  const hasSpec  = /[^A-Za-z0-9]/.test(pw);

  document.getElementById('rule-len').classList.toggle('met', hasLen);
  document.getElementById('rule-upper').classList.toggle('met', hasUpper);
  document.getElementById('rule-num').classList.toggle('met', hasNum);

  const score  = [hasLen, hasUpper, hasNum, hasSpec].filter(Boolean).length;
  const bars   = ['bar1','bar2','bar3','bar4'];
  const levels = ['weak','fair','good','strong'];
  const labels = ['Weak','Fair','Good','Strong'];

  bars.forEach((id, i) => {
    const el = document.getElementById(id);
    el.className = 'pw-bar';
    if (i < score) el.classList.add(levels[score - 1]);
  });
  document.getElementById('pwLabel').textContent = labels[score - 1] || '';
}

async function changePassword() {
  const btn     = document.getElementById('btnSubmit');
  const errMsg  = document.getElementById('errorMsg');
  const current = document.getElementById('currentPw').value;
  const newPw   = document.getElementById('newPw').value;
  const confirm = document.getElementById('confirmPw').value;

  errMsg.classList.remove('show');

  if (!current || !newPw || !confirm) {
    errMsg.textContent = 'Please fill in all fields.';
    errMsg.classList.add('show');
    return;
  }
  if (newPw.length < 8) {
    errMsg.textContent = 'New password must be at least 8 characters.';
    errMsg.classList.add('show');
    return;
  }
  if (newPw !== confirm) {
    errMsg.textContent = 'New passwords do not match.';
    errMsg.classList.add('show');
    return;
  }
  if (current === newPw) {
    errMsg.textContent = 'New password must be different from your current password.';
    errMsg.classList.add('show');
    return;
  }

  btn.classList.add('loading');
  btn.disabled = true;

  try {
    // Step 1: get current session
    const { data: { session } } = await _supabase.auth.getSession();
    if (!session) { window.location.href = 'login.html'; return; }

    // Step 2: re-authenticate to verify current password
    const { error: signInErr } = await _supabase.auth.signInWithPassword({
      email: session.user.email,
      password: current,
    });

    if (signInErr) {
      errMsg.textContent = 'Current password is incorrect.';
      errMsg.classList.add('show');
      btn.classList.remove('loading');
      btn.disabled = false;
      return;
    }

    // Step 3: update password
    const { error: updateErr } = await _supabase.auth.updateUser({ password: newPw });
    if (updateErr) throw updateErr;

    // Step 4: show success and redirect
    document.getElementById('formContent').style.display = 'none';
    document.getElementById('successMsg').classList.add('show');

    const target = ['admin', 'super_admin'].includes(currentUserRole)
      ? 'admin.html'
      : 'dashboard.html';
    setTimeout(() => { window.location.href = target; }, 2500);

  } catch (err) {
    errMsg.textContent = err.message || 'Something went wrong. Please try again.';
    errMsg.classList.add('show');
    btn.classList.remove('loading');
    btn.disabled = false;
  }
}

async function handleLogout() {
  await _supabase.auth.signOut();
  window.location.href = 'login.html';
}

init();
</script>
</body>
</html>
