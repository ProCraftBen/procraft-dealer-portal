<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ProCraft — Quote Detail</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <script src="pdf-builder.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold:#C9A84C; --green-dark:#3e5a42; --green-mid:#4a6b4f;
      --cream:#F5F2EC; --text:#2C3A32; --muted:#7A8C82; --border:#DDD8CC; --white:#FFFFFF;
      --status-pending:#C9A84C; --status-processing:#3B82F6; --status-complete:#16A34A; --status-closed:#6B7280;
      --status-draft:#7A8C82; --status-returned:#E07B39;
    }
    html, body { min-height: 100%; font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--text); }
    .navbar { background: var(--green-dark); padding: 0 24px; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .nav-brand { display: flex; align-items: center; gap: 10px; }
    .nav-title { font-family: 'Cormorant Garamond', serif; font-size: 17px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: #fff; }
    .nav-right { display: flex; align-items: center; gap: 16px; }
    .nav-link { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.5); text-decoration: none; transition: color 0.2s; }
    .nav-link:hover, .nav-link.active { color: #fff; }
    .nav-logout { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.5); cursor: pointer; border: 1px solid rgba(255,255,255,0.15); border-radius: 3px; padding: 6px 12px; background: transparent; }
    .nav-logout:hover { color: #fff; }
    .hamburger { display: none; flex-direction: column; justify-content: center; gap: 5px; width: 36px; height: 36px; background: none; border: none; cursor: pointer; padding: 4px; }
    .hamburger span { display: block; width: 22px; height: 2px; background: rgba(255,255,255,0.7); border-radius: 2px; transition: all 0.25s; }
    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
    .mobile-menu { display: none; position: fixed; top: 60px; left: 0; right: 0; background: #3e5a42; border-top: 1px solid rgba(255,255,255,0.08); z-index: 99; flex-direction: column; padding: 8px 0 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
    .mobile-menu.show { display: flex; }
    .mobile-menu a, .mobile-menu button { display: block; width: 100%; padding: 12px 24px; font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.6); text-decoration: none; background: none; border: none; text-align: left; cursor: pointer; font-family: 'DM Sans', sans-serif; }
    .mobile-menu a:hover, .mobile-menu button:hover { color: #fff; background: rgba(255,255,255,0.05); }
    .mobile-menu .menu-divider { height: 1px; background: rgba(255,255,255,0.08); margin: 8px 0; }
    @media (max-width: 768px) { .nav-right { display: none !important; } .hamburger { display: flex !important; } }
    .page { max-width: 860px; margin: 0 auto; padding: 32px 20px 80px; }
    .quote-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 28px; flex-wrap: wrap; gap: 16px; }
    .quote-number { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 400; color: var(--green-dark); }
    .quote-date { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
    .status-badge { display: inline-block; padding: 5px 14px; border-radius: 3px; font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; }
    .status-badge.pending    { background: rgba(201,168,76,0.12);  color: var(--status-pending); }
    .status-badge.processing { background: rgba(59,130,246,0.1);   color: var(--status-processing); }
    .status-badge.complete   { background: rgba(22,163,74,0.1);    color: var(--status-complete); }
    .status-badge.closed     { background: rgba(107,114,128,0.1);  color: var(--status-closed); }
    .status-badge.draft      { background: rgba(122,140,130,0.12); color: var(--status-draft); }
    .status-badge.returned   { background: rgba(224,123,57,0.14);  color: var(--status-returned); }
    .btn-action { display: inline-flex; align-items: center; gap: 7px; background: var(--green-dark); color: #fff; border: none; border-radius: 3px; padding: 10px 18px; font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; transition: background 0.2s; text-decoration: none; }
    .btn-action:hover { background: var(--green-mid); }
    .btn-action svg { width: 14px; height: 14px; fill: currentColor; }
    .btn-action.secondary { background: transparent; color: var(--green-dark); border: 1px solid var(--green-dark); }
    .btn-action.secondary:hover { background: var(--green-dark); color: #fff; }
    .btn-action.return-edit { background: var(--status-returned); color: #fff; }
    .btn-action.return-edit:hover { background: #c66a30; }

    /* ── Returned Reason Banner ── */
    .return-banner {
      background: rgba(224,123,57,0.07);
      border: 1px solid rgba(224,123,57,0.3);
      border-left: 4px solid var(--status-returned);
      border-radius: 4px;
      padding: 18px 22px;
      margin-bottom: 24px;
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }
    .return-banner .return-icon-wrap {
      flex-shrink: 0;
      width: 36px; height: 36px;
      background: rgba(224,123,57,0.14);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin-top: 2px;
    }
    .return-banner .return-icon-wrap svg { width: 18px; height: 18px; fill: var(--status-returned); }
    .return-banner-body { flex: 1; min-width: 0; }
    .return-banner-title {
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--status-returned);
      margin-bottom: 6px;
    }
    .return-banner-msg {
      font-size: 13px;
      color: var(--text);
      line-height: 1.65;
      margin-bottom: 12px;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .return-banner-action { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .return-banner-meta {
      font-size: 11px;
      color: var(--muted);
      font-style: italic;
    }

    /* ── Return History (Admin only) ── */
    .return-history {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 4px;
      margin-bottom: 24px;
      overflow: hidden;
    }
    .return-history-header {
      padding: 14px 20px;
      background: #FAFAF8;
      border-bottom: 1px solid transparent;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      transition: background 0.15s;
      user-select: none;
    }
    .return-history-header:hover { background: #F5F3EF; }
    .return-history.open .return-history-header { border-bottom-color: var(--border); }
    .return-history-title {
      display: flex; align-items: center; gap: 8px;
      font-size: 10px; font-weight: 500;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--green-dark);
    }
    .return-history-title svg { width: 14px; height: 14px; fill: var(--status-returned); }
    .return-history-count {
      display: inline-block;
      background: rgba(224,123,57,0.14);
      color: var(--status-returned);
      font-size: 10px; font-weight: 600;
      padding: 2px 8px;
      border-radius: 10px;
      letter-spacing: 0.05em;
    }
    .return-history-toggle {
      font-size: 11px; color: var(--muted);
      display: flex; align-items: center; gap: 4px;
    }
    .return-history-toggle svg {
      width: 12px; height: 12px; fill: currentColor;
      transition: transform 0.2s;
    }
    .return-history.open .return-history-toggle svg { transform: rotate(180deg); }
    .return-history-body {
      display: none;
      padding: 16px 20px 20px;
    }
    .return-history.open .return-history-body { display: block; }
    .return-history-empty {
      font-size: 12px; color: var(--muted); font-style: italic;
      padding: 8px 0;
    }
    .return-event {
      position: relative;
      padding: 14px 14px 14px 18px;
      margin-bottom: 12px;
      background: #FAFAF8;
      border-radius: 3px;
      border-left: 3px solid var(--status-returned);
    }
    .return-event:last-child { margin-bottom: 0; }
    .return-event-head {
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      margin-bottom: 8px;
      font-size: 11px;
    }
    .return-event-version {
      background: var(--status-returned);
      color: #fff;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 2px;
      letter-spacing: 0.05em;
    }
    .return-event-by {
      color: var(--green-dark);
      font-weight: 500;
    }
    .return-event-time {
      color: var(--muted);
      margin-left: auto;
      font-size: 10px;
    }
    .return-event-reason {
      font-size: 13px;
      color: var(--text);
      line-height: 1.6;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .card { background: var(--white); border: 1px solid var(--border); border-radius: 4px; margin-bottom: 16px; overflow: hidden; }
    .card-header { padding: 14px 20px; border-bottom: 1px solid var(--border); background: #FAFAF8; }
    .card-title { font-size: 10px; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; color: var(--green-dark); }
    .card-body { padding: 20px; }
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 480px) { .info-grid { grid-template-columns: 1fr; } }
    .info-label { font-size: 9px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
    .info-value { font-size: 13px; color: var(--text); line-height: 1.6; }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    thead th { padding: 10px 16px; background: #F5F3EF; border-bottom: 1px solid var(--border); font-size: 9px; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); text-align: left; white-space: nowrap; }
    thead th.r { text-align: right; }
    tbody tr { border-bottom: 1px solid var(--border); }
    tbody tr:last-child { border-bottom: none; }
    tbody td { padding: 12px 16px; font-size: 13px; vertical-align: middle; }
    tbody td.r { text-align: right; }
    .td-num { font-size: 11px; color: var(--muted); font-weight: 500; white-space: nowrap; }
    .td-style { font-weight: 500; color: var(--green-dark); }
    .td-sku { color: var(--muted); font-size: 11px; }
    .type-badge { display: inline-block; padding: 2px 7px; border-radius: 2px; font-size: 10px; }
    .type-badge.rta { background: rgba(62,90,66,0.07); color: var(--green-dark); }
    .type-badge.assembled { background: rgba(201,168,76,0.12); color: #8B6914; }
    .totals { padding: 4px 20px 20px; }
    .total-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
    .total-row:last-child { border-bottom: none; }
    .total-row.grand { padding-top: 12px; }
    .total-row.grand .total-label { font-size: 14px; font-weight: 500; color: var(--green-dark); }
    .total-row.grand .total-val { font-size: 16px; font-weight: 500; color: var(--green-dark); }
    .total-label { color: var(--muted); }
    .total-val { font-weight: 500; }
    .asm-breakdown { padding: 2px 0 6px 16px; }
    .asm-breakdown-row { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); padding: 2px 0; }
    .free-tag { font-size: 10px; color: var(--status-complete); margin-left: 6px; }
    .exempt-tag { font-size: 10px; color: var(--status-complete); margin-left: 6px; }

    /* ── C1: Pending Shipping styles ── */
    .pending-tag {
      font-size: 10px;
      color: var(--status-returned);
      margin-left: 6px;
      font-style: italic;
    }
    .total-val.pending {
      color: var(--status-returned);
      font-weight: 600;
    }
    .pending-grand-note {
      font-size: 11px;
      color: var(--status-returned);
      font-style: italic;
      text-align: right;
      padding-top: 6px;
    }

    .loading-wrap { padding: 80px 20px; text-align: center; color: var(--muted); }
    .spinner-large { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--green-dark); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-wrap { padding: 80px 20px; text-align: center; color: var(--muted); }
    @media print { .navbar, .btn-action, .hamburger, .mobile-menu, .return-banner, .return-history { display: none !important; } .page { padding: 0; max-width: 100%; } body { background: #fff; } }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="nav-brand">
    <img style="height:44px;max-width:110px;object-fit:contain;" src="https://acwgemgpnusworpxxoai.supabase.co/storage/v1/object/public/assets/ProCraft-DC-Logo-white.png" alt="ProCraft DC"/>
    <span class="nav-title">ProCraft DC</span>
  </div>
  <div class="nav-right" id="navRight"></div>
  <button class="hamburger" id="hamburger" onclick="toggleMenu()">
    <span></span><span></span><span></span>
  </button>
</nav>

<div class="mobile-menu" id="mobileMenu">
  <div id="mobileMenuLinks"></div>
  <div class="menu-divider"></div>
  <button onclick="handleLogout()">Sign Out</button>
</div>

<div class="page" id="pageContent">
  <div class="loading-wrap"><div class="spinner-large"></div>Loading quote...</div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const { createClient } = window.supabase;
const _supabase = createClient(
  'https://acwgemgpnusworpxxoai.supabase.co',
  'sb_publishable_GYx1PEpxNJ9dj5V3WYpPWQ_8YfB0w8M'
);

const TYPE_ORDER = ['BASE','WALL','TALL','ACCESSORIES','MODIFICATION'];
const statusClass = {
  Draft:'draft',
  Pending:'pending',
  Processing:'processing',
  Complete:'complete',
  Closed:'closed',
  Returned:'returned',
};

// Store for PDF generation
let _quote = null, _dealer = null, _addr = null, _isAdmin = false;
let _returnHistory = [];

function toggleMenu() {
  const btn = document.getElementById('hamburger');
  const menu = document.getElementById('mobileMenu');
  btn.classList.toggle('open');
  menu.classList.toggle('show');
}
document.addEventListener('click', function(e) {
  const btn = document.getElementById('hamburger');
  const menu = document.getElementById('mobileMenu');
  if (btn && menu && !btn.contains(e.target) && !menu.contains(e.target)) {
    btn.classList.remove('open'); menu.classList.remove('show');
  }
});

async function handleLogout() { await _supabase.auth.signOut(); window.location.href = 'login.html'; }
function fmt(n) { return '$' + parseFloat(n || 0).toFixed(2); }
function formatDate(str) { return new Date(str).toLocaleDateString('en-US', { month:'long', day:'numeric', year:'numeric' }); }
function formatDateTime(str) {
  return new Date(str).toLocaleString('en-US', {
    month:'short', day:'numeric', year:'numeric',
    hour:'numeric', minute:'2-digit', hour12:true,
  });
}

// HTML escape (防止 return_reason / notes 等使用者輸入內容把版面搞壞)
function escapeHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// ── C1: Pending shipping detection ──
// shipping_cost === null AND logistic_type === 'shipping' → pending Sales confirmation
function isPendingShipping(quote) {
  if (!quote) return false;
  if (quote.logistic_type !== 'shipping') return false;
  return (quote.shipping_cost === null || quote.shipping_cost === undefined);
}

async function init() {
  const { data: { session } } = await _supabase.auth.getSession();
  if (!session) { window.location.href = 'login.html'; return; }

  const params  = new URLSearchParams(window.location.search);
  const quoteId = params.get('id');
  if (!quoteId) { showError('No quote ID provided.'); return; }

  const { data: quote, error: qErr } = await _supabase
    .from('quotes').select('*, quote_items(*)').eq('id', quoteId).single();
  if (qErr || !quote) { showError('Quote not found.'); return; }

  const { data: me } = await _supabase.from('dealers').select('role').eq('id', session.user.id).single();
  const isAdmin = ['admin','super_admin'].includes(me?.role);
  _isAdmin = isAdmin;
  if (!isAdmin && quote.dealer_id !== session.user.id) { showError('You do not have permission to view this quote.'); return; }

  if (isAdmin) {
    document.getElementById('navRight').innerHTML = `
      <a href="admin.html" class="nav-link">Dashboard</a>
      <a href="admin-quotes.html" class="nav-link active">Quotes</a>
      <a href="admin-dealers.html" class="nav-link">Dealers</a>
      <button class="nav-logout" onclick="handleLogout()">Sign Out</button>`;
    document.getElementById('mobileMenuLinks').innerHTML = `
      <a href="admin.html">Dashboard</a><a href="admin-quotes.html" class="active">Quotes</a><a href="admin-dealers.html">Dealers</a>`;
  } else {
    document.getElementById('navRight').innerHTML = `
      <a href="dashboard.html" class="nav-link">Dashboard</a>
      <a href="quotes.html" class="nav-link active">My Quotes</a>
      <a href="new-quote.html" class="nav-link">New Quote</a>
      <a href="dealer-profile.html" class="nav-link">Edit Profile</a>
      <button class="nav-logout" onclick="handleLogout()">Sign Out</button>`;
    document.getElementById('mobileMenuLinks').innerHTML = `
      <a href="dashboard.html">Dashboard</a><a href="quotes.html" class="active">My Quotes</a>
      <a href="new-quote.html">New Quote</a><a href="dealer-profile.html">Edit Profile</a>`;
  }

  const { data: dealer } = await _supabase.from('dealers').select('*').eq('id', quote.dealer_id).single();
  let shippingAddr = null;
  if (quote.shipping_address_id) {
    const { data: addr } = await _supabase.from('addresses').select('*').eq('id', quote.shipping_address_id).single();
    shippingAddr = addr;
  }

  // ── Admin only: load return history ──
  if (isAdmin) {
    const { data: history, error: histErr } = await _supabase
      .from('quote_return_history')
      .select('*')
      .eq('quote_id', quote.id)
      .order('returned_at', { ascending: false });

    if (histErr) {
      console.warn('[init] Failed to load return history:', histErr);
      _returnHistory = [];
    } else {
      _returnHistory = history || [];

      const adminIds = [...new Set(_returnHistory.map(h => h.returned_by))];
      if (adminIds.length > 0) {
        const { data: admins } = await _supabase
          .from('dealers')
          .select('id, contact_name, email')
          .in('id', adminIds);
        const adminMap = {};
        (admins || []).forEach(a => { adminMap[a.id] = a; });
        _returnHistory.forEach(h => {
          h._returnedByInfo = adminMap[h.returned_by] || null;
        });
      }
    }
  }

  // Store for PDF
  _quote = quote; _dealer = dealer; _addr = shippingAddr;
  renderQuote(quote, dealer, shippingAddr);
}

// ── 產生 Return History 區塊 HTML（只有 admin 看得到）──
function buildReturnHistoryHtml() {
  if (!_isAdmin) return '';
  if (!_returnHistory || _returnHistory.length === 0) return '';

  const eventsHtml = _returnHistory.map(h => {
    const adminInfo  = h._returnedByInfo;
    const adminLabel = adminInfo
      ? (adminInfo.contact_name || adminInfo.email || 'Unknown admin')
      : 'Unknown admin';

    return `
      <div class="return-event">
        <div class="return-event-head">
          <span class="return-event-version">v${h.revision_at_return}</span>
          <span>Returned by</span>
          <span class="return-event-by">${escapeHtml(adminLabel)}</span>
          <span class="return-event-time">${formatDateTime(h.returned_at)}</span>
        </div>
        <div class="return-event-reason">${escapeHtml(h.return_reason || '—')}</div>
      </div>`;
  }).join('');

  const count = _returnHistory.length;
  return `
    <div class="return-history" id="returnHistorySection">
      <div class="return-history-header" onclick="toggleReturnHistory()">
        <div class="return-history-title">
          <svg viewBox="0 0 24 24"><path d="M13 3a9 9 0 00-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42A8.954 8.954 0 0013 21a9 9 0 000-18zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>
          Return History
          <span class="return-history-count">${count} event${count !== 1 ? 's' : ''}</span>
        </div>
        <span class="return-history-toggle">
          <span id="returnHistoryToggleText">Show</span>
          <svg viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg>
        </span>
      </div>
      <div class="return-history-body">
        <div style="font-size:11px;color:var(--muted);font-style:italic;margin-bottom:12px;">
          Internal record — only visible to admins. Dealers cannot see this history.
        </div>
        ${eventsHtml}
      </div>
    </div>`;
}

function toggleReturnHistory() {
  const el = document.getElementById('returnHistorySection');
  if (!el) return;
  const isOpen = el.classList.toggle('open');
  const txt = document.getElementById('returnHistoryToggleText');
  if (txt) txt.textContent = isOpen ? 'Hide' : 'Show';
}

function renderQuote(quote, dealer, addr) {
  const items = quote.quote_items || [];
  const sc    = statusClass[quote.status] || 'pending';
  const isReturned = quote.status === 'Returned';

  // C1: detect pending shipping for display logic
  const pendingShipping = isPendingShipping(quote);

  const shippingHtml = addr
    ? `<strong>${escapeHtml(addr.recipient_name || dealer?.company_name)}</strong><br>${escapeHtml(addr.address_line)}<br>${addr.address_line2 ? escapeHtml(addr.address_line2)+'<br>' : ''}${escapeHtml(addr.city)}, ${escapeHtml(addr.state)} ${escapeHtml(addr.zip_code)}`
    : `<strong>${escapeHtml(dealer?.company_name || '—')}</strong><br>${escapeHtml(dealer?.address_line1 || '')}<br>${dealer?.address_line2 ? escapeHtml(dealer.address_line2)+'<br>' : ''}${escapeHtml(dealer?.city || '')}, ${escapeHtml(dealer?.state || '')} ${escapeHtml(dealer?.zip_code || '')}`;

  // Group & sort
  const grouped = {};
  items.forEach(i => {
    const k = i.style_name || i.style_code || '—';
    if(!grouped[k]) grouped[k] = [];
    grouped[k].push(i);
  });
  Object.keys(grouped).forEach(k => {
    grouped[k].sort((a,b) => {
      const ra=TYPE_ORDER.indexOf((a.sku_type||'').toUpperCase());
      const rb=TYPE_ORDER.indexOf((b.sku_type||'').toUpperCase());
      return (ra===-1?99:ra)-(rb===-1?99:rb);
    });
  });

  let itemNum=0, lastStyle=null;
  const itemsHtml = items.length
    ? Object.entries(grouped).map(([styleName, styleItems]) =>
        styleItems.map(i => {
          itemNum++;
          const showStyle = styleName !== lastStyle; lastStyle = styleName;
          const skuLine = `${escapeHtml(i.sku_code||'—')}${i.sku_desc ? `<br><span style="font-size:10px;color:var(--muted);">${escapeHtml(i.sku_desc)}</span>` : ''}`;
          return `<tr>
            <td class="td-num">#${itemNum}</td>
            <td class="td-style">${showStyle ? escapeHtml(styleName) : ''}</td>
            <td class="td-sku">${skuLine}</td>
            <td>${i.sku_type ? `<span style="font-size:9px;background:rgba(201,168,76,0.12);color:#8B6914;border-radius:2px;padding:1px 5px;">${escapeHtml(i.sku_type.toUpperCase())}</span>` : '—'}</td>
            <td><span class="type-badge ${(i.assemble_status||'').toLowerCase()}">${escapeHtml(i.assemble_status||'—')}</span></td>
            <td class="r">${i.quantity}</td>
            <td class="r">${fmt(i.unit_price)}</td>
            <td class="r" style="color:var(--muted);">${parseFloat(i.assemble_fee||0)>0 ? `+${fmt(i.assemble_fee*i.quantity)}` : '—'}</td>
            <td class="r">${fmt(i.unit_price*i.quantity)}</td>
          </tr>`;
        }).join('')).join('')
    : `<tr><td colspan="9" style="text-align:center;padding:24px;color:var(--muted);">No items.</td></tr>`;

  // Assemble breakdown
  const byType={};
  items.forEach(i => {
    if((i.assemble_status||'').toLowerCase()!=='assembled'||!i.assemble_fee) return;
    const t=(i.sku_type||'OTHER').toUpperCase();
    if(!byType[t]) byType[t]={qty:0,total:0};
    byType[t].qty+=i.quantity; byType[t].total+=parseFloat(i.assemble_fee)*i.quantity;
  });
  const assembleTotal=items.reduce((s,i)=>s+parseFloat(i.assemble_fee||0)*i.quantity,0);
  const asmBreakdown=assembleTotal>0
    ? `<div class="total-row" style="flex-direction:column;align-items:stretch;gap:0;">
        <div style="display:flex;justify-content:space-between;padding-bottom:4px;">
          <span class="total-label">Assemble Fee</span><span class="total-val">${fmt(assembleTotal)}</span>
        </div>
        <div class="asm-breakdown">
          ${TYPE_ORDER.filter(t=>byType[t]).map(t=>
            `<div class="asm-breakdown-row"><span>${t} ×${byType[t].qty}</span><span>+${fmt(byType[t].total)}</span></div>`
          ).join('')}
        </div>
      </div>` : '';

  // C1: Shipping row — handle pending case
  // freeShip 只有「非 pending && shipping_cost === 0」才算
  const freeShip  = !pendingShipping && parseFloat(quote.shipping_cost) === 0 && parseFloat(quote.subtotal) > 0;
  const taxExempt = parseFloat(quote.tax_amount) === 0;

  let shippingRowHtml;
  if (pendingShipping) {
    shippingRowHtml = `
      <div class="total-row">
        <span class="total-label">Shipping <span class="pending-tag">⚠ Awaiting Sales confirmation</span></span>
        <span class="total-val pending">Pending — Contact Sales Team</span>
      </div>`;
  } else {
    shippingRowHtml = `
      <div class="total-row">
        <span class="total-label">Shipping${freeShip ? ' <span class="free-tag">✓ Free</span>' : ''}</span>
        <span class="total-val">${freeShip ? 'FREE' : fmt(quote.shipping_cost)}</span>
      </div>`;
  }

  // C1: Pending grand total footnote
  const pendingFootnote = pendingShipping
    ? `<div class="pending-grand-note">* Shipping fee pending — final total will be confirmed by Sales</div>`
    : '';

  // ── Item 7: 依 status 渲染下載按鈕 ──
  let downloadButtonsHtml;
  if (quote.status === 'Draft') {
    downloadButtonsHtml = `
      <button class="btn-action" onclick="downloadDraftQuote()">
        <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zm-8 2V5h2v6h1.17L12 13.17 9.83 11H11zm-6 7h14v2H5v-2z"/></svg>
        Download Draft Quote
      </button>`;
  } else {
    downloadButtonsHtml = `
      <button class="btn-action secondary" onclick="downloadPackingList()">
        <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zm-8 2V5h2v6h1.17L12 13.17 9.83 11H11zm-6 7h14v2H5v-2z"/></svg>
        Download Packing List
      </button>
      <button class="btn-action" onclick="downloadInvoice()">
        <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zm-8 2V5h2v6h1.17L12 13.17 9.83 11H11zm-6 7h14v2H5v-2z"/></svg>
        Download Invoice
      </button>`;
  }

  // ── Returned banner（最上方）+ Edit & Resubmit 按鈕 ──
  let returnedBannerHtml = '';
  if (isReturned) {
    const reasonText = quote.return_reason
      ? escapeHtml(quote.return_reason)
      : '<span style="color:var(--muted);font-style:italic;">No reason provided.</span>';

    const editButtonHtml = `
      <a href="new-quote.html?draft=${quote.id}" class="btn-action return-edit">
        <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 000-1.41l-2.34-2.34a1 1 0 00-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
        Edit &amp; Resubmit
      </a>`;

    const adminViewMsg = _isAdmin
      ? '<span class="return-banner-meta">As an admin, you can edit on the dealer\'s behalf and save as draft. The dealer will need to submit the quote.</span>'
      : '';

    returnedBannerHtml = `
      <div class="return-banner">
        <div class="return-icon-wrap">
          <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
        </div>
        <div class="return-banner-body">
          <div class="return-banner-title">This Quote Has Been Returned for Revision</div>
          <div class="return-banner-msg">${reasonText}</div>
          <div class="return-banner-action">
            ${editButtonHtml}
            ${adminViewMsg}
          </div>
        </div>
      </div>`;
  }

  // ── Return History（admin only，放最上方）──
  const returnHistoryHtml = buildReturnHistoryHtml();

  document.getElementById('pageContent').innerHTML = `
    ${returnedBannerHtml}
    ${returnHistoryHtml}
    <div class="quote-header">
      <div>
        <div class="quote-number">${escapeHtml(quote.po_number||'—')}</div>
        <div class="quote-date">Submitted ${formatDate(quote.created_at)}</div>
      </div>
      <div class="header-right">
        <span class="status-badge ${sc}">${quote.status}</span>
        ${downloadButtonsHtml}
      </div>
    </div>

    <div class="card">
      <div class="card-header"><span class="card-title">Order Information</span></div>
      <div class="card-body">
        <div class="info-grid">
          <div><div class="info-label">PO Number</div><div class="info-value">${escapeHtml(quote.po_number||'—')}</div></div>
          <div><div class="info-label">Job Name</div><div class="info-value">${escapeHtml(quote.job_name||'—')}</div></div>
          <div><div class="info-label">Dealer</div><div class="info-value">${escapeHtml(dealer?.company_name||'—')}</div></div>
          <div><div class="info-label">Contact</div><div class="info-value">${escapeHtml(dealer?.contact_name||'—')}</div></div>
          <div><div class="info-label">Logistic</div><div class="info-value" style="text-transform:capitalize;">${escapeHtml(quote.logistic_type||'—')}</div></div>
          <div><div class="info-label">Status</div><div class="info-value"><span class="status-badge ${sc}" style="font-size:10px;">${quote.status}</span></div></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header"><span class="card-title">Shipping Address</span></div>
      <div class="card-body"><div class="info-value">${shippingHtml}</div></div>
    </div>

    ${quote.notes ? `<div class="card"><div class="card-header"><span class="card-title">Notes</span></div><div class="card-body"><div class="info-value" style="font-style:italic;">${escapeHtml(quote.notes)}</div></div></div>` : ''}

    <div class="card">
      <div class="card-header"><span class="card-title">Items</span></div>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>#</th><th>Door Style</th><th>SKU</th><th>Type</th><th>Assemble Status</th>
            <th class="r">Qty</th><th class="r">Unit Price</th><th class="r">Asm Fee</th><th class="r">Total</th>
          </tr></thead>
          <tbody>${itemsHtml}</tbody>
        </table>
      </div>
      <div class="totals">
        <div class="total-row"><span class="total-label">Subtotal</span><span class="total-val">${fmt(quote.subtotal)}</span></div>
        ${asmBreakdown}
        ${shippingRowHtml}
        <div class="total-row">
          <span class="total-label">Tax${taxExempt?' <span class="exempt-tag">✓ Exempt</span>':''}</span>
          <span class="total-val">${fmt(quote.tax_amount)}</span>
        </div>
        <div class="total-row grand">
          <span class="total-label">Order Total</span><span class="total-val">${fmt(quote.grand_total)}</span>
        </div>
        ${pendingFootnote}
      </div>
    </div>`;
}

// ── Build quoteData object for pdf-builder.js ──
function buildQuoteDataForPdf() {
  const items = (_quote.quote_items || []).map(function(i) {
    return {
      style_name:      i.style_name || i.style_code || '—',
      style_code:      i.style_code,
      sku_code:        i.sku_code,
      sku_desc:        i.sku_desc || '',
      sku_type:        i.sku_type || null,
      assemble_status: i.assemble_status,
      quantity:        i.quantity,
      unit_price:      parseFloat(i.unit_price || 0),
      msrp:            i.msrp || null,
      assemble_fee:    parseFloat(i.assemble_fee || 0),
    };
  });

  // C1: pass shipping_cost (may be null) so pdf-builder can render
  // "Contact Sales Team" + exclude shipping from grand total.
  // Use null literal when DB has null, so _isPendingShipping detects it.
  const shippingCost = (_quote.shipping_cost === null || _quote.shipping_cost === undefined)
    ? null
    : parseFloat(_quote.shipping_cost);

  return {
    po_number:     _quote.po_number || null,
    job_name:      _quote.job_name || null,
    status:        _quote.status,
    created_at:    _quote.created_at,
    logistic_type: _quote.logistic_type || 'pickup',
    delivery_fee:  parseFloat(_quote.delivery_fee || 0),
    shipping_cost: shippingCost,                         // C1
    items:         items,
    // Quote Detail 一律 markup=0；用 DB snapshot 的金額反推 taxRate
    _taxRate:    parseFloat(_quote.subtotal || 0) > 0
                  ? parseFloat(_quote.tax_amount || 0) / parseFloat(_quote.subtotal || 1)
                  : 0,
    _taxExempt:  parseFloat(_quote.tax_amount || 0) === 0,
  };
}

// ── 三種下載對應到 pdf-builder.js 的三種 PDF ──

// Item 7: Draft 狀態 → Download Draft Quote
async function downloadDraftQuote() {
  if (!_quote || !_dealer) return;
  const quoteDataForPdf = buildQuoteDataForPdf();
  const doc = await ProCraftPDF.buildDraftQuotePdf(
    quoteDataForPdf, _dealer, _addr, { markupPercent: 0 }
  );
  const filename = ProCraftPDF.getPdfFilename('draft-quote', {
    poNumber:       _quote.po_number || 'Draft',
    dealerUid:      _dealer.uid,
    revisionNumber: _quote.revision_number || 1,
  });
  doc.save(filename);
}

// Item 7: 其他狀態 → Download Packing List
async function downloadPackingList() {
  if (!_quote || !_dealer) return;
  const quoteDataForPdf = buildQuoteDataForPdf();
  const doc = await ProCraftPDF.buildPackingListPdf(
    quoteDataForPdf, _dealer, _addr
  );
  const filename = ProCraftPDF.getPdfFilename('packing-list', {
    poNumber:       _quote.po_number || 'Quote',
    revisionNumber: _quote.revision_number || 1,
  });
  doc.save(filename);
}

// Item 7: 其他狀態 → Download Invoice
async function downloadInvoice() {
  if (!_quote || !_dealer) return;
  const quoteDataForPdf = buildQuoteDataForPdf();
  const doc = await ProCraftPDF.buildInvoicePdf(
    quoteDataForPdf, _dealer, _addr, { markupPercent: 0 }
  );
  const filename = ProCraftPDF.getPdfFilename('invoice', {
    poNumber:       _quote.po_number || 'Quote',
    revisionNumber: _quote.revision_number || 1,
  });
  doc.save(filename);
}

function showError(msg) {
  document.getElementById('pageContent').innerHTML=`<div class="error-wrap"><svg viewBox="0 0 24 24" style="width:40px;height:40px;fill:var(--border);margin:0 auto 16px;display:block;"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>${msg}</div>`;
}

init();
</script>
