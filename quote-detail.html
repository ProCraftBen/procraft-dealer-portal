<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ProCraft — Quote Detail</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.8.2/jspdf.plugin.autotable.min.js"></script>
  <script src="pdf-builder.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold:#C9A84C; --green-dark:#3e5a42; --green-mid:#4a6b4f;
      --cream:#F5F2EC; --text:#2C3A32; --muted:#7A8C82; --border:#DDD8CC; --white:#FFFFFF;
      --status-pending:#C9A84C; --status-processing:#3B82F6; --status-complete:#16A34A; --status-closed:#6B7280;
      --status-draft:#7A8C82; --status-returned:#E07B39;
      --error:#C0392B;
      --discount:#C0392B;
    }
    html, body { min-height: 100%; font-family: 'DM Sans', sans-serif; background: var(--cream); color: var(--text); }
    .page { max-width: 920px; margin: 0 auto; padding: 32px 20px 80px; }

    /* Back link */
    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: var(--muted);
      text-decoration: none;
      margin-bottom: 18px;
      transition: color 0.15s;
      letter-spacing: 0.02em;
    }
    .back-link:hover { color: var(--green-dark); }

    .quote-header { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 28px; flex-wrap: wrap; gap: 16px; }
    .quote-number { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 400; color: var(--green-dark); }
    .quote-date { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .header-right { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; justify-content: flex-end; }
    .status-badge { display: inline-block; padding: 5px 14px; border-radius: 3px; font-size: 11px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; }
    .status-badge.pending    { background: rgba(201,168,76,0.12);  color: var(--status-pending); }
    .status-badge.processing { background: rgba(59,130,246,0.1);   color: var(--status-processing); }
    .status-badge.complete   { background: rgba(22,163,74,0.1);    color: var(--status-complete); }
    .status-badge.closed     { background: rgba(107,114,128,0.1);  color: var(--status-closed); }
    .status-badge.draft      { background: rgba(122,140,130,0.12); color: var(--status-draft); }
    .status-badge.returned   { background: rgba(224,123,57,0.14);  color: var(--status-returned); }
    .btn-action { display: inline-flex; align-items: center; gap: 7px; background: var(--green-dark); color: #fff; border: none; border-radius: 3px; padding: 10px 18px; font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; cursor: pointer; transition: background 0.2s; text-decoration: none; }
    .btn-action:hover { background: var(--green-mid); }
    .btn-action svg { width: 14px; height: 14px; fill: currentColor; }
    .btn-action.secondary { background: transparent; color: var(--green-dark); border: 1px solid var(--green-dark); }
    .btn-action.secondary:hover { background: var(--green-dark); color: #fff; }
    .btn-action.review-resubmit { background: var(--status-returned); color: #fff; }
    .btn-action.review-resubmit:hover { background: #c66a30; }
    .btn-action.admin-edit { background: var(--gold); color: #fff; }
    .btn-action.admin-edit:hover { background: #b69240; }

    /* ── Returned Reason Banner ── */
    .return-banner {
      background: rgba(224,123,57,0.07);
      border: 1px solid rgba(224,123,57,0.3);
      border-left: 4px solid var(--status-returned);
      border-radius: 4px;
      padding: 18px 22px;
      margin-bottom: 24px;
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }
    .return-banner .return-icon-wrap {
      flex-shrink: 0;
      width: 36px; height: 36px;
      background: rgba(224,123,57,0.14);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin-top: 2px;
    }
    .return-banner .return-icon-wrap svg { width: 18px; height: 18px; fill: var(--status-returned); }
    .return-banner-body { flex: 1; min-width: 0; }
    .return-banner-title {
      font-size: 11px; font-weight: 600;
      letter-spacing: 0.15em; text-transform: uppercase;
      color: var(--status-returned);
      margin-bottom: 6px;
    }
    .return-banner-msg {
      font-size: 13px;
      color: var(--text);
      line-height: 1.65;
      margin-bottom: 12px;
      white-space: pre-wrap;
      word-wrap: break-word;
    }
    .return-banner-action { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; }
    .return-banner-meta {
      font-size: 11px;
      color: var(--muted);
      font-style: italic;
    }

    /* ── Return History (Admin only) ── */
    .return-history {
      background: var(--white);
      border: 1px solid var(--border);
      border-radius: 4px;
      margin-bottom: 24px;
      overflow: hidden;
    }
    .return-history-header {
      padding: 14px 20px;
      background: #FAFAF8;
      border-bottom: 1px solid transparent;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      transition: background 0.15s;
      user-select: none;
    }
    .return-history-header:hover { background: #F5F3EF; }
    .return-history.open .return-history-header { border-bottom-color: var(--border); }
    .return-history-title {
      display: flex; align-items: center; gap: 8px;
      font-size: 10px; font-weight: 500;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--green-dark);
    }
    .return-history-title svg { width: 14px; height: 14px; fill: var(--status-returned); }
    .return-history-count {
      display: inline-block;
      background: rgba(224,123,57,0.14);
      color: var(--status-returned);
      font-size: 10px; font-weight: 600;
      padding: 2px 8px;
      border-radius: 10px;
      letter-spacing: 0.05em;
    }
    .return-history-toggle {
      font-size: 11px; color: var(--muted);
      display: flex; align-items: center; gap: 4px;
    }
    .return-history-toggle svg {
      width: 12px; height: 12px; fill: currentColor;
      transition: transform 0.2s;
    }
    .return-history.open .return-history-toggle svg { transform: rotate(180deg); }
    .return-history-body {
      display: none;
      padding: 16px 20px 20px;
    }
    .return-history.open .return-history-body { display: block; }
    .return-event {
      position: relative;
      padding: 14px 14px 14px 18px;
      margin-bottom: 12px;
      background: #FAFAF8;
      border-radius: 3px;
      border-left: 3px solid var(--status-returned);
    }
    .return-event:last-child { margin-bottom: 0; }
    .return-event-head {
      display: flex; align-items: center; gap: 10px; flex-wrap: wrap;
      margin-bottom: 8px;
      font-size: 11px;
    }
    .return-event-version {
      background: var(--status-returned);
      color: #fff;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 2px;
      letter-spacing: 0.05em;
    }
    .return-event-by {
      color: var(--green-dark);
      font-weight: 500;
    }
    .return-event-time {
      color: var(--muted);
      margin-left: auto;
      font-size: 10px;
    }
    .return-event-reason {
      font-size: 13px;
      color: var(--text);
      line-height: 1.6;
      white-space: pre-wrap;
      word-wrap: break-word;
    }

    .card { background: var(--white); border: 1px solid var(--border); border-radius: 4px; margin-bottom: 16px; overflow: hidden; }
    .card-header { padding: 14px 20px; border-bottom: 1px solid var(--border); background: #FAFAF8; }
    .card-title { font-size: 10px; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; color: var(--green-dark); }
    .card-body { padding: 20px; }
    .info-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    @media (max-width: 480px) { .info-grid { grid-template-columns: 1fr; } }
    .info-label { font-size: 9px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
    .info-value { font-size: 13px; color: var(--text); line-height: 1.6; }

    /* ────────────────────────────────────────────────────────────────
       Items table — aligned with new-quote-step3.html (F4.1 v2)
       11 columns including Mod Fee, sub-group support, mods inline
    ──────────────────────────────────────────────────────────────── */
    .items-table { width: 100%; border-collapse: collapse; }
    .items-table thead th { padding: 9px 10px; background: #F5F3EF; border-bottom: 1px solid var(--border); font-size: 9px; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); text-align: left; white-space: nowrap; }
    .items-table thead th.th-right { text-align: right; }
    .items-table tbody tr { border-bottom: 1px solid var(--border); }
    .items-table tbody tr:last-child { border-bottom: none; }
    .items-table td { padding: 10px 10px; font-size: 13px; vertical-align: top; }
    .td-style { font-weight: 500; color: var(--green-dark); }
    .td-sku { color: var(--text); font-size: 12px; font-weight: 500; white-space: nowrap; }
    .td-desc { color: var(--muted); font-size: 12px; line-height: 1.5; }
    .td-desc .desc-main { color: var(--text); font-size: 12px; margin-bottom: 4px; }
    .td-type .type-badge { display: inline-block; padding: 2px 7px; border-radius: 2px; font-size: 10px; letter-spacing: 0.05em; white-space: nowrap; }
    .td-type .type-badge.rta { background: rgba(62,90,66,0.07); color: var(--green-dark); }
    .td-type .type-badge.assembled { background: rgba(201,168,76,0.12); color: #8B6914; }
    .td-right { text-align: right; }
    .td-total { font-weight: 500; }

    /* F-CUSTOM: [CUSTOM] badge — gold bg + gold text, consistent with step2/2.5/3 */
    .custom-badge {
      display: inline-block;
      background: rgba(201,168,76,0.18);
      color: #8B6914;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.08em;
      padding: 1px 5px;
      border-radius: 2px;
      margin-left: 6px;
      vertical-align: middle;
    }

    /* F-PROMOTIONS: [PROMO] badge — red bg + red text, mirrors step3 */
    .promo-badge {
      display: inline-block;
      background: rgba(192,57,43,0.10);
      color: #C0392B;
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.08em;
      padding: 1px 5px;
      border-radius: 2px;
      margin-left: 6px;
      vertical-align: middle;
    }

    .items-table tbody tr.sub-continuation {
      border-top: 1px dashed rgba(201,168,76,0.25);
    }
    .items-table tbody tr.sub-continuation td:first-child {
      border-left: 2px solid rgba(201,168,76,0.35);
    }
    .sub-label {
      display: inline-block;
      font-size: 10px;
      letter-spacing: 0.05em;
      color: #8B6914;
      background: rgba(201,168,76,0.10);
      padding: 1px 6px;
      border-radius: 2px;
      margin-top: 4px;
    }

    .mods-list {
      margin-top: 6px;
      padding: 6px 0 0;
      border-top: 1px dotted rgba(125,140,130,0.25);
    }
    .mods-list .mod-line {
      font-size: 11px;
      color: var(--green-dark);
      line-height: 1.5;
      padding: 1px 0;
    }
    .mods-list .mod-line .mod-bullet { color: var(--gold); margin-right: 4px; }
    .mods-list .mod-material {
      font-size: 11px;
      color: var(--green-mid);
      line-height: 1.4;
      padding: 0 0 1px 14px;
    }
    .mods-list .mod-line .mod-note-ref {
      color: #E07B39;
      font-style: italic;
      font-size: 11px;
    }
    .mods-list .mod-status-skipped,
    .mods-list .mod-status-unprocessed {
      font-size: 11px;
      color: var(--muted);
      font-style: italic;
    }

    .td-modfee { color: #8B6914; font-weight: 500; }
    
    /* CB-7: type divider row（橫跨 9 欄）*/
    .items-table tbody tr.type-divider td {
      padding: 8px 12px;
      background: rgba(62,90,66,0.06);
      border-top: 1px solid var(--green-mid);
      border-bottom: 1px solid var(--green-mid);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--green-dark);
      text-align: center;
    }
    /* CB-7: mod 子項移入 SKU 欄後需允許換行（td-sku 原為 nowrap）*/
    .items-table td.td-sku .mods-list,
    .items-table td.td-sku .mods-list * { white-space: normal; }
    

    /* ────────────────────────────────────────────────────────────────
       Notes table for MF06 / MF07 / long values
       (aligned with new-quote-step3.html)
    ──────────────────────────────────────────────────────────────── */
    .notes-table-wrap {
      margin: 14px 20px 0;
      padding: 14px 16px;
      background: rgba(224,123,57,0.04);
      border: 1px solid rgba(224,123,57,0.2);
      border-radius: 4px;
    }
    .notes-table-title {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #E07B39;
      margin-bottom: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .notes-table-title svg { width: 14px; height: 14px; fill: #E07B39; }
    .notes-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--white);
      border: 1px solid rgba(224,123,57,0.25);
      border-radius: 3px;
      overflow: hidden;
    }
    .notes-table thead th {
      padding: 7px 10px;
      background: rgba(224,123,57,0.08);
      font-size: 9px;
      font-weight: 600;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #8B6914;
      text-align: left;
      border-bottom: 1px solid rgba(224,123,57,0.2);
    }
    .notes-table tbody td {
      padding: 9px 10px;
      font-size: 12px;
      color: var(--text);
      vertical-align: top;
      border-bottom: 1px solid rgba(224,123,57,0.12);
      line-height: 1.5;
    }
    .notes-table tbody tr:last-child td { border-bottom: none; }
    .notes-table .note-num {
      font-weight: 600;
      color: #E07B39;
      white-space: nowrap;
      width: 40px;
    }
    .notes-table .note-item {
      color: var(--green-dark);
      white-space: nowrap;
      font-size: 11px;
      font-weight: 500;
    }
    .notes-table .note-mf {
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
    }
    .notes-table .note-content {
      color: var(--text);
      font-size: 12px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* Totals */
    .totals { padding: 4px 20px 20px; }
    .total-row { display: flex; justify-content: space-between; padding: 8px 0; border-bottom: 1px solid var(--border); font-size: 13px; }
    .total-row:last-child { border-bottom: none; }
    .total-row.grand { padding-top: 12px; }
    .total-row.grand .total-label { font-size: 14px; font-weight: 500; color: var(--green-dark); }
    .total-row.grand .total-val { font-size: 16px; font-weight: 500; color: var(--green-dark); }
    .total-label { color: var(--muted); }
    .total-val { font-weight: 500; }
    .asm-breakdown { padding: 2px 0 6px 16px; }
    .asm-breakdown-row { display: flex; justify-content: space-between; font-size: 11px; color: var(--muted); padding: 2px 0; }
    .free-tag { font-size: 10px; color: var(--status-complete); margin-left: 6px; }
    .exempt-tag { font-size: 10px; color: var(--status-complete); margin-left: 6px; }
    .tax-note-detail {
      font-size: 11px;
      color: var(--muted);
      margin-top: 2px;
    }

    /* F-PROMOTIONS: discount row styling — red minus value, mirrors step3 */
    .total-row.discount .total-val { color: var(--discount); font-weight: 500; }
    .total-row.discount .discount-sublabel {
      font-size: 10px; color: var(--discount); opacity: 0.75;
      margin-top: 2px; letter-spacing: 0.04em;
    }

    /* ── C1: Pending Shipping styles ── */
    .pending-tag {
      font-size: 10px;
      color: var(--status-returned);
      margin-left: 6px;
      font-style: italic;
    }
    .total-val.pending {
      color: var(--status-returned);
      font-weight: 600;
    }
    .pending-grand-note {
      font-size: 11px;
      color: var(--status-returned);
      font-style: italic;
      text-align: right;
      padding-top: 6px;
    }

    /* ── C1: Admin shipping editor (admin-only inline UI) ── */
    .admin-edit-link {
      font-size: 10px;
      color: var(--gold);
      cursor: pointer;
      letter-spacing: 0.05em;
      margin-left: 8px;
      text-decoration: none;
      display: inline-block;
      padding: 2px 6px;
      border: 1px solid rgba(201,168,76,0.4);
      border-radius: 2px;
      background: rgba(201,168,76,0.06);
      transition: all 0.15s;
    }
    .admin-edit-link:hover {
      color: var(--green-dark);
      border-color: var(--green-dark);
      background: rgba(62,90,66,0.07);
    }
    .admin-shipping-editor {
      display: none;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      margin: 4px 0;
      background: rgba(201,168,76,0.08);
      border: 1px solid rgba(201,168,76,0.3);
      border-radius: 3px;
    }
    .admin-shipping-editor.show { display: flex; }
    .admin-shipping-editor .editor-label {
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--green-dark);
      flex-shrink: 0;
    }
    .admin-shipping-editor input {
      width: 100px;
      height: 32px;
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 0 10px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      text-align: right;
    }
    .admin-shipping-editor input:focus {
      outline: none;
      border-color: var(--green-dark);
    }
    .editor-currency-prefix {
      color: var(--muted);
      font-size: 13px;
    }
    .editor-btn {
      height: 32px;
      padding: 0 14px;
      border: none;
      border-radius: 3px;
      font-family: 'DM Sans', sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.15s;
    }
    .editor-btn.save {
      background: var(--green-dark);
      color: #fff;
    }
    .editor-btn.save:hover { background: var(--green-mid); }
    .editor-btn.save:disabled { opacity: 0.5; cursor: not-allowed; }
    .editor-btn.cancel {
      background: transparent;
      color: var(--muted);
      border: 1px solid var(--border);
    }
    .editor-btn.cancel:hover { color: var(--text); border-color: var(--text); }
    .editor-error {
      width: 100%;
      font-size: 11px;
      color: var(--error);
      padding-top: 4px;
    }
    .editor-hint {
      font-size: 11px;
      color: var(--muted);
      font-style: italic;
      flex-basis: 100%;
      padding-top: 2px;
    }

    .loading-wrap { padding: 80px 20px; text-align: center; color: var(--muted); }
    .spinner-large { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--green-dark); border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto 16px; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .error-wrap { padding: 80px 20px; text-align: center; color: var(--muted); }
    @media print { .btn-action, .back-link, .return-banner, .return-history, .admin-edit-link, .admin-shipping-editor { display: none !important; } .page { padding: 0; max-width: 100%; } body { background: #fff; } }
  </style>
</head>
<body>

<div id="pcd-nav" data-page="quotes"></div>

<div class="page" id="pageContent">
  <div class="loading-wrap"><div class="spinner-large"></div>Loading quote...</div>
</div>

<div id="pcd-footer"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="components/navigator.js"></script>
<script src="components/footer.js"></script>
<script>
const { createClient } = window.supabase;
const _supabase = createClient(
  'https://acwgemgpnusworpxxoai.supabase.co',
  'sb_publishable_GYx1PEpxNJ9dj5V3WYpPWQ_8YfB0w8M'
);

// F-CUSTOM (Phase 5): Added 'OTHER' between ACCESSORIES and MODIFICATION,
// aligned with new-quote-step3.html. Custom Other items get sku_type='OTHER'
// and need a defined sort rank.
const TYPE_ORDER = ['BASE','WALL','TALL','ACCESSORIES','OTHER','MODIFICATION'];
const statusClass = {
  Draft:'draft',
  Pending:'pending',
  Processing:'processing',
  Complete:'complete',
  Closed:'closed',
  Returned:'returned',
};

// CB-2: Display-only status label map. DB status values are unchanged —
// this only affects what the badge text shows. 'Returned' (DB) → 'Revising' (UI).
const statusLabel = {
  Returned: 'Revising',
};

// ── C1: which statuses allow admin to edit shipping_cost ──
const SHIPPING_EDIT_ALLOWED_STATUSES = ['Pending', 'Returned'];

// ── CB-4: which statuses allow admin to enter Edit mode (revision flow) ──
// Admin can edit dealer-submitted POs in Pending, and previously-returned
// POs in Returned (in case customer requests further changes). Draft has

const ADMIN_EDIT_ALLOWED_STATUSES = ['Pending', 'Returned'];

// ─────────────────────────────────────────────────────────────────────────────
// F-PROMOTIONS (2026-05-21) — Module-level campaign config.
//
// MUST stay in sync with the const in new-quote-step3.html, pdf-builder.js,
// and the send-quote-email Edge Function. When the campaign ends, set
// active:false (or empty PROMOTIONS array) in ALL FOUR places.
//
// Quote-detail computes discount live from quote_items.style_code — we don't
// rely on a snapshot in the quotes table (per "不動 schema" decision). This
// means: if you change the discount_pct or style_codes mid-campaign, OLD
// quotes will retroactively show the NEW discount. Acceptable because there's
// only one campaign at a time and quotes are short-lived.
// ─────────────────────────────────────────────────────────────────────────────
const PROMOTIONS = [
  {
    id:           'LSW_LSG_LSA_20OFF',
    label:        'LSW/LSG/LSA Promo Discount (20% off)',
    style_codes:  ['LSW', 'LSG', 'LSA'],
    discount_pct: 20,
    applies_to:   'line_items',
    active:       true,
  },
];

/**
 * Pure function (mirrors step3 calculatePromotionDiscount):
 * Takes a list of items with .style_code / .unit_price / .quantity and
 * returns { totalDiscount, matchedLineCount, matchedSubtotal, appliedPromo }.
 *
 * NOTE: For quote-detail, "items" are the RECONSTRUCTED groupedItems where
 * .quantity is the SUM of sub_groups[].qty. This matches step3's per-style-row
 * granularity, so discount counts are consistent across the two surfaces.
 */
function calculatePromotionDiscount(items) {
  const result = {
    totalDiscount:    0,
    matchedLineCount: 0,
    matchedSubtotal:  0,
    appliedPromo:     null,
  };
  if (!Array.isArray(items) || !items.length) return result;

  const activePromos = (PROMOTIONS || []).filter(function (p) { return p && p.active; });
  if (!activePromos.length) return result;

  activePromos.forEach(function (promo) {
    const styleSet = new Set((promo.style_codes || []).map(function (c) { return String(c).toUpperCase(); }));
    if (!styleSet.size) return;
    const pct = parseFloat(promo.discount_pct) || 0;
    if (pct <= 0) return;

    let promoMatched     = 0;
    let promoSubtotal    = 0;
    let promoDiscount    = 0;

    items.forEach(function (item) {
      if (!item) return;
      const code = String(item.style_code || '').toUpperCase();
      if (!styleSet.has(code)) return;

      const unitPrice = parseFloat(item.unit_price) || 0;
      const qty       = parseInt(item.quantity, 10) || 0;
      if (unitPrice <= 0 || qty <= 0) return;

      const lineSubtotal = unitPrice * qty;
      const lineDiscount = lineSubtotal * (pct / 100);
      promoMatched  += 1;
      promoSubtotal += lineSubtotal;
      promoDiscount += lineDiscount;
    });

    if (promoMatched > 0) {
      result.totalDiscount    += promoDiscount;
      result.matchedLineCount += promoMatched;
      result.matchedSubtotal  += promoSubtotal;
      if (!result.appliedPromo) result.appliedPromo = promo;
    }
  });

  return result;
}

function getActivePromoStyleCodes() {
  const set = new Set();
  (PROMOTIONS || []).forEach(function (p) {
    if (!p || !p.active) return;
    (p.style_codes || []).forEach(function (c) {
      set.add(String(c).toUpperCase());
    });
  });
  return set;
}

// CB-5 需求3: RTA → 顯示 Unassembled(全字);DB value 不動

// ─────────────────────────────────────────────────────────────────────────────
// CB-9 (2026-06-02): Resolve a line-item's Tag from the SKU catalog.
//   quote_items 沒有 construction_type,改用 style_code join door_styles(_allDoorStyles)
//   推得 framed/frameless,再決定查 skus_framed 還是 skus_frameless;用 sku_code 比對拿 tag。
//   construction_type 推不出(custom / 查不到門花色)→ 預設查 framed,仍查不到 → 回空字串。
//   與 step3 getTagForItem() 同義(step3 的 item 自帶 construction_type,此處需反查)。
// ─────────────────────────────────────────────────────────────────────────────
function getTagForItem(item) {
  if (!item || !item.sku_code) return '';
  let ct = '';
  if (item.style_code && Array.isArray(_allDoorStyles)) {
    const ds = _allDoorStyles.find(function (d) { return d.style_code === item.style_code; });
    if (ds) ct = (ds.construction_type || '').toLowerCase();
  }
  const source = ct === 'frameless' ? _allSkusFrameless : _allSkusFramed;
  const match  = source.find(function (s) { return s.sku_code === item.sku_code; });
  return (match && match.tag) ? match.tag : '';
}

// CB-5 需求1: 整單 lead time(用 style_code join door_styles)
// 任何 frameless → ~5 Weeks;全 framed 全 stock → ~3 Business Days;全 framed 有 non-stock → ~2 Weeks
// 查不到門花色(custom / accessory / 停產)的 item 不納入判斷
function calculateLeadTime(items, doorStyles) {
  let anyFrameless = false, anyNonStock = false, anyKnown = false;
  (items || []).forEach(function (it) {
    if (!it || !it.style_code || !Array.isArray(doorStyles)) return;
    const s = doorStyles.find(function (d) { return d.style_code === it.style_code; });
    if (!s) return;
    const ct = (s.construction_type || '').toLowerCase();
    if (ct === 'frameless') { anyFrameless = true; anyKnown = true; }
    else if (ct === 'framed') { anyKnown = true; if (s.is_stock !== true) anyNonStock = true; }
  });
  if (!anyKnown) return null;
  if (anyFrameless) return '~5 Weeks';
  return anyNonStock ? '~2 Weeks' : '~3 Business Days';
}

function buildLeadTimeHtml(items, doorStyles) {
  const lt = calculateLeadTime(items, doorStyles);
  if (!lt) return '';
  return '<div style="margin-top:10px;text-align:right;">' +
    '<span style="font-size:11px;letter-spacing:0.12em;text-transform:uppercase;color:var(--muted);margin-right:8px;">Estimated Lead Time</span>' +
    '<span style="font-size:13px;font-weight:600;color:var(--green-mid);">' + escapeHtml(lt) + '</span></div>';
}

// F4.1 v2 — Notes table configuration (aligned with new-quote-step3.html)

const MF_USE_NOTES_TABLE = ['MF06', 'MF07'];
const NOTES_TABLE_FALLBACK_LENGTH = 40;

// Store for PDF generation
let _quote = null, _dealer = null, _addr = null, _isAdmin = false;
let _returnHistory = [];
let _groupedItems = null; // F4.1 v2: items reconstructed into per-SKU sub_groups
let _allDoorStyles = [];  // CB-5 需求1: door_styles 快取(整單 lead time)
let _allSkusFramed    = [];  // CB-9: tag 查表用(skus_framed)
let _allSkusFrameless = [];  // CB-9: tag 查表用(skus_frameless)

function fmt(n) { return '$' + parseFloat(n || 0).toFixed(2); }
function formatDate(str) { return new Date(str).toLocaleDateString('en-US', { month:'long', day:'numeric', year:'numeric' }); }
function formatDateTime(str) {
  return new Date(str).toLocaleString('en-US', {
    month:'short', day:'numeric', year:'numeric',
    hour:'numeric', minute:'2-digit', hour12:true,
  });
}

// HTML escape
function escapeHtml(s) {
  return String(s == null ? '' : s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/'/g, '&#39;');
}

// ── C1: Pending shipping detection ──
function isPendingShipping(quote) {
  if (!quote) return false;
  if (quote.logistic_type !== 'shipping') return false;
  return (quote.shipping_cost === null || quote.shipping_cost === undefined);
}

// ─────────────────────────────────────────────────────────────────────────────
// F4.1 v2 — Helpers ported from new-quote-step3.html
// ─────────────────────────────────────────────────────────────────────────────

function shouldUseNotesTable(mod) {
  if (!mod) return false;
  const code = (mod.mf_code || '').toUpperCase();
  if (MF_USE_NOTES_TABLE.indexOf(code) !== -1) return true;
  const valStr = formatModValue(mod.value);
  if (valStr && valStr.length > NOTES_TABLE_FALLBACK_LENGTH) return true;
  return false;
}

// ─────────────────────────────────────────────────────────────────────────────
// F-HIDDEN-MODS (2026-05-18) — Display-layer filter for mods that should be
// recorded in DB but NOT shown in this view (admin / dealer detail page).
// Mirrors new-quote-step3.html isHiddenMod() and pdf-builder.js _isHiddenMod().
// ─────────────────────────────────────────────────────────────────────────────
function isHiddenMod(mod) {
  if (!mod) return false;
  if (mod.mf_code === 'MF01' && mod.value === 'none') return true;
  return false;
}

// Format mod value: handles MF01 (string), MF07 ({selected, description, ...}), MF06 (free text), etc.
function formatModValue(v) {
  if (v == null) return '';
  if (typeof v === 'string')  return v;
  if (typeof v === 'number')  return String(v);
  if (typeof v === 'boolean') return v ? 'Yes' : 'No';
  if (typeof v === 'object') {
    // F-QTY-SELECTOR: MF03 toggle-with-qty 的 value { enabled, qty }。
    if ('enabled' in v && !('value' in v) && !('selected' in v) && !('label' in v)) {
      if (v.enabled !== true) return '';
      return (typeof v.qty === 'number') ? ('Qty ' + v.qty) : 'Yes';
    }
    const parts = [];
    if ('selected' in v && v.selected) parts.push(String(v.selected));
    else if ('label' in v && v.label)  parts.push(String(v.label));
    else if ('value' in v && v.value != null) parts.push(String(v.value));

    if ('description' in v && v.description) parts.push(String(v.description));
    else if ('note' in v && v.note)          parts.push(String(v.note));

    if (parts.length) return parts.join(' — ');
    try { return JSON.stringify(v); } catch (e) { return ''; }
  }
  return String(v);
}

function calcPerSubModCost(sub) {
  const mods = Array.isArray(sub.modifications) ? sub.modifications : [];
  return mods.reduce(function (s, m) {
    var c  = parseFloat(m && m.cost);
    var mt = parseFloat(m && m.material_cost);   // CB-6: 加材料(per-unit)
    return s + (isNaN(c) ? 0 : c) + (isNaN(mt) ? 0 : mt);
    return s + (isNaN(c) ? 0 : c);
  }, 0);
}

function calcPerSubTaxableModCost(sub) {
  const mods = Array.isArray(sub.modifications) ? sub.modifications : [];
  return mods.reduce(function (s, m) {
    if (!m || m.tax_status !== true) return s;
    var c  = parseFloat(m.cost);
    var mt = parseFloat(m.material_cost);   // CB-6: 課稅 mod 才把材料計入稅基
    return s + (isNaN(c) ? 0 : c) + (isNaN(mt) ? 0 : mt);
    return s + (isNaN(c) ? 0 : c);
  }, 0);
}

// Calculate total mod cost across all grouped items
function calcTotalModsCost(groupedItems) {
  let total = 0;
  groupedItems.forEach(function (item) {
    item.sub_groups.forEach(function (sub) {
      const perSub = calcPerSubModCost(sub);
      const qty    = parseInt(sub.qty, 10) || 0;
      total += perSub * qty;
    });
  });
  return total;
}

function calcTaxableModsCost(groupedItems) {
  let total = 0;
  groupedItems.forEach(function (item) {
    item.sub_groups.forEach(function (sub) {
      const perSub = calcPerSubTaxableModCost(sub);
      const qty    = parseInt(sub.qty, 10) || 0;
      total += perSub * qty;
    });
  });
  return total;
}

// ─────────────────────────────────────────────────────────────────────────────
// F-PROMOTIONS helper: groupedItems → flat shape for calculatePromotionDiscount.
//
// calculatePromotionDiscount expects items with .style_code / .unit_price /
// .quantity. groupedItems have multi-sub structure where .quantity must be
// summed across sub_groups. This adapter flattens that view.
// ─────────────────────────────────────────────────────────────────────────────
function groupedItemsToPromoShape(groupedItems) {
  return (groupedItems || []).map(function (item) {
    const totalQty = (item.sub_groups || []).reduce(function (s, g) {
      return s + (parseInt(g.qty, 10) || 0);
    }, 0);
    return {
      style_code: item.style_code,
      unit_price: item.unit_price,
      quantity:   totalQty,
    };
  });
}

// ─────────────────────────────────────────────────────────────────────────────
// F4.1 v2 — Reconstruct sub_groups from flat quote_items rows.
//
// In v1.1, each quote_items row is ONE sub-group. Multiple rows with the same
// sku_code (+ other stable fields) belong to the same logical item.
//
// F-CUSTOM (Phase 5): grouping key includes is_custom for safety.
// ─────────────────────────────────────────────────────────────────────────────
function reconstructGroupedItems(rawItems) {
  const itemMap = new Map();
  const itemOrder = [];

  rawItems.forEach(function (row) {
    const key = [
      row.sku_code || '',
      row.style_code || '',
      row.style_name || '',
      String(row.unit_price || 0),
      row.assemble_status || '',
      row.is_custom ? '1' : '0',
    ].join('||');

    if (!itemMap.has(key)) {
      itemMap.set(key, {
        sku_code:        row.sku_code,
        style_code:      row.style_code,
        style_name:      row.style_name || row.style_code || '—',
        sku_desc:        row.sku_desc || '',
        sku_type:        row.sku_type || null,
        assemble_status: row.assemble_status || 'RTA',
        unit_price:      parseFloat(row.unit_price || 0),
        msrp:            row.msrp || null,
        assemble_fee:    parseFloat(row.assemble_fee || 0),
        is_custom:       !!row.is_custom,
        sub_groups:      [],
      });
      itemOrder.push(key);
    }

    const item = itemMap.get(key);
    item.sub_groups.push({
      sub_index:           row.sub_index || 1,
      qty:                 parseInt(row.quantity, 10) || 0,
      modifications:       Array.isArray(row.modifications) ? row.modifications : [],
      modification_status: row.modification_status || 'unprocessed',
    });
  });

  itemMap.forEach(function (item) {
    item.sub_groups.sort(function (a, b) { return (a.sub_index || 1) - (b.sub_index || 1); });
  });

  return itemOrder.map(function (key) { return itemMap.get(key); });
}

// Group items by style_name, sort within group by sku_type rank.
function groupAndSortByStyle(groupedItems) {
  const byStyle = {};
  groupedItems.forEach(function (item) {
    const k = item.style_name || item.style_code || '—';
    if (!byStyle[k]) byStyle[k] = [];
    byStyle[k].push(item);
  });
  Object.keys(byStyle).forEach(function (k) {
    byStyle[k].sort(function (a, b) {
      const ra = TYPE_ORDER.indexOf((a.sku_type || '').toUpperCase());
      const rb = TYPE_ORDER.indexOf((b.sku_type || '').toUpperCase());
      return (ra === -1 ? 99 : ra) - (rb === -1 ? 99 : rb);
    });
  });
  return byStyle;
}

// CB-7: type-group ordering（BASE 最前 → 中間字母序 → ACCESSORIES → OTHER）
function typeGroupTier(type) {
  const t = (type || 'OTHER').toUpperCase();
  if (t === 'BASE')        return 0;
  if (t === 'ACCESSORIES') return 2;
  if (t === 'OTHER')       return 3;
  return 1;  // 中間：字母序
}

function groupByTypeOrdered(data) {
  const buckets = {};
  (data || []).forEach(function (item) {
    const t = (item.sku_type || 'OTHER').toUpperCase();
    if (!buckets[t]) buckets[t] = [];
    buckets[t].push(item);
  });
  Object.keys(buckets).forEach(function (t) {
    buckets[t].sort(function (a, b) {
      const sa = String(a.style_code || '').toUpperCase();
      const sb = String(b.style_code || '').toUpperCase();
      if (sa < sb) return -1;
      if (sa > sb) return 1;
      return 0;
    });
  });
  return Object.keys(buckets)
    .sort(function (a, b) {
      const ta = typeGroupTier(a), tb = typeGroupTier(b);
      if (ta !== tb) return ta - tb;
      if (a < b) return -1;
      if (a > b) return 1;
      return 0;
    })
    .map(function (t) { return { type: t, items: buckets[t] }; });
}

// ─────────────────────────────────────────────────────────────────────────────
// F4.1 v2.1 — Render mods inside Description column (NO fees).
//
// F-HIDDEN-MODS (2026-05-18): Filter mods via isHiddenMod() BEFORE empty-check.
// ─────────────────────────────────────────────────────────────────────────────
function renderModsBlock(sub, notesIndex, notesCollector, itemContext) {
  const rawMods     = Array.isArray(sub.modifications) ? sub.modifications : [];
  const visibleMods = rawMods.filter(function (m) { return !isHiddenMod(m); });
  const status = sub.modification_status || 'unprocessed';

  if (!visibleMods.length) {
    if (rawMods.length > 0) {
      return '';
    }
    if (status === 'skipped' || status === 'configured') {
      return '';
    }
    return `<div class="mods-list"><span class="mod-status-unprocessed">⚠ Modifications pending</span></div>`;
  }

  const lines = visibleMods.map(function (m) {
    const label = m.display_label || m.mf_code || 'Modification';
    const useNotes = shouldUseNotesTable(m);

    if (useNotes) {
      notesIndex.counter += 1;
      const noteNum = notesIndex.counter;
      notesCollector.push({
        num:        noteNum,
        skuCode:    itemContext.sku_code,
        subIndex:   sub.sub_index || 1,
        subTotal:   itemContext.totalSubs,
        mfCode:     m.mf_code || '',
        label:      label,
        content:    formatModValue(m.value) || '(no detail)',
      });
      return `<div class="mod-line">${escapeHtml(label)}: <span class="mod-note-ref">[See note №${noteNum} below]</span></div>`;
    }

    const value = formatModValue(m.value);
    const valStr = value ? `: ${escapeHtml(value)}` : '';
    // CB-6: 材料子行  N × MappingSKU: $Material  (N = mapping_qty × sub.qty)
    let matHtml = '';
    const _mq = parseInt(m.mapping_qty, 10) || 0;
    if (m.mapping_sku && _mq > 0) {
      const _subQty   = parseInt(sub.qty, 10) || 0;
      const _mc       = parseFloat(m.material_cost);
      const _n        = _mq * _subQty;
      const _matTotal = (isNaN(_mc) ? 0 : _mc) * _subQty;
      matHtml = `<div class="mod-material">${_n} × ${escapeHtml(m.mapping_sku)}: $${_matTotal.toFixed(2)}</div>`;
    }
    return `<div class="mod-line">${escapeHtml(label)}${valStr}</div>${matHtml}`;
  });

  return `<div class="mods-list">${lines.join('')}</div>`;
}

function renderNotesTable(notes) {
  if (!notes.length) return '';
  const rows = notes.map(function (n) {
    const subSuffix = (n.subTotal > 1) ? ` (Sub ${n.subIndex}/${n.subTotal})` : '';
    return `
      <tr>
        <td class="note-num">№${n.num}</td>
        <td class="note-item">${escapeHtml(n.skuCode)}${escapeHtml(subSuffix)}</td>
        <td class="note-mf">${escapeHtml(n.label)}${n.mfCode ? ` <span style="color:#bbb;">(${escapeHtml(n.mfCode)})</span>` : ''}</td>
        <td class="note-content">${escapeHtml(n.content)}</td>
      </tr>`;
  }).join('');
  return `
    <div class="notes-table-wrap">
      <div class="notes-table-title">
        <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/></svg>
        Modification Notes &amp; Custom Details
      </div>
      <table class="notes-table">
        <thead>
          <tr>
            <th>№</th>
            <th>Item</th>
            <th>Modification</th>
            <th>Detail / Note</th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

// ─────────────────────────────────────────────────────────────────────────────
// Build the full items table HTML + collect notes.
// Returns { rowsHtml, notes }
//
// F-CUSTOM (Phase 5): Custom items get a gold [CUSTOM] badge next to SKU code.
// F-PROMOTIONS (2026-05-21): Promo-eligible items get a red [PROMO] badge.
// F-COL-ABBREVIATIONS (2026-05-21): Type / Asm Status use 3-letter codes.
// F-LINE-TOTAL-INCLUDES-ASM (2026-05-21): Total = Unit + Mod + Asm.
// ─────────────────────────────────────────────────────────────────────────────
function buildItemRowsHtml(groupedItems) {
  const groups = groupByTypeOrdered(groupedItems);
  const promoStyleCodes = getActivePromoStyleCodes();  // F-PROMOTIONS

  let itemNum = 0;
  const rows = [];
  const notes = [];
  const notesIndex = { counter: 0 };

  groups.forEach(function (group) {
    // CB-7 / CB-9: 橫跨 10 欄的 type divider，不佔 Item 編號
    rows.push(`
      <tr class="type-divider">
        <td colspan="10">========== ${escapeHtml(group.type)} ==========</td>
      </tr>`);

    group.items.forEach(function (item) {
      const subs = item.sub_groups;
      const isSplit = subs.length > 1;
      const isCustom = !!item.is_custom;
      const isPromo  = promoStyleCodes.has(String(item.style_code || '').toUpperCase());
      const skuPrefix = item.style_code ? escapeHtml(item.style_code) + '-' : '';

      subs.forEach(function (sub, subIdx) {
        itemNum++;
        const isFirstSub = subIdx === 0;

        const subQty = parseInt(sub.qty, 10) || 0;
        const perSubModCost = calcPerSubModCost(sub);
        const modFeeTotal   = perSubModCost * subQty;
        const skuLineTotal  = item.unit_price * subQty;
        const asmFeeTotal   = (item.assemble_fee || 0) * subQty;
        const lineTotal     = skuLineTotal + modFeeTotal + asmFeeTotal;

        const subLabelHtml = isSplit
          ? `<br><span class="sub-label">Sub ${subIdx + 1} of ${subs.length}</span>`
          : '';
        const customBadgeHtml = (isCustom && isFirstSub)
          ? `<span class="custom-badge">CUSTOM</span>` : '';
        const promoBadgeHtml = (isPromo && isFirstSub)
          ? `<span class="promo-badge">PROMO</span>` : '';

        
        // CB-9: Tag 只在主行(第一個 sub)顯示,子項留空
        const tagCellHtml = isFirstSub ? escapeHtml(getTagForItem(item)) : '';
        const itemContext = { sku_code: item.sku_code, totalSubs: subs.length };
        const modsBlockHtml = renderModsBlock(sub, notesIndex, notes, itemContext);

        // CB-7: mod 子項放 SKU 欄
        const skuCellHtml  = `${skuPrefix}${escapeHtml(item.sku_code)}${customBadgeHtml}${promoBadgeHtml}${subLabelHtml}${modsBlockHtml}`;
        const descCellHtml = item.sku_desc ? `<div class="desc-main">${escapeHtml(item.sku_desc)}</div>` : '';

        const assembledHtml = isFirstSub ? (item.assemble_status === 'RTA' ? 'No' : 'Yes') : '';
        const trClass = isFirstSub ? '' : 'sub-continuation';

        const modFeeCellHtml = modFeeTotal > 0
          ? `<span class="td-modfee">+$${modFeeTotal.toFixed(2)}</span>`
          : '<span style="color:var(--muted);">—</span>';

        const asmFeeCellHtml = asmFeeTotal > 0
          ? `<span style="color:var(--muted);">+$${asmFeeTotal.toFixed(2)}</span>`
          : '<span style="color:var(--muted);">—</span>';

        rows.push(`
          <tr class="${trClass}">
            <td style="font-size:11px;color:var(--muted);font-weight:500;white-space:nowrap;">#${itemNum}</td>
            <td style="font-size:12px;white-space:nowrap;">${tagCellHtml}</td>
            <td class="td-sku">${skuCellHtml}</td>
            <td class="td-desc">${descCellHtml}</td>
            <td class="td-right">${subQty}</td>
            <td style="font-size:12px;">${assembledHtml}</td>
            <td class="td-right">$${item.unit_price.toFixed(2)}</td>
            <td class="td-right">${modFeeCellHtml}</td>
            <td class="td-right">${asmFeeCellHtml}</td>
            <td class="td-right td-total">$${lineTotal.toFixed(2)}</td>
          </tr>`);
      });
    });
  });

  return { rowsHtml: rows.join(''), notes: notes };
}

// ─────────────────────────────────────────────────────────────────────────────
// init / load
// ─────────────────────────────────────────────────────────────────────────────
async function init() {
  const { data: { session } } = await _supabase.auth.getSession();
  if (!session) { window.location.href = 'login.html'; return; }

  const params  = new URLSearchParams(window.location.search);
  const quoteId = params.get('id');
  if (!quoteId) { showError('No quote ID provided.'); return; }

  const { data: quote, error: qErr } = await _supabase
    .from('quotes').select('*, quote_items(*)').eq('id', quoteId).single();
  if (qErr || !quote) { showError('Quote not found.'); return; }

  const { data: me } = await _supabase.from('dealers').select('role').eq('id', session.user.id).single();
  const isAdmin = ['admin','super_admin'].includes(me?.role);
  _isAdmin = isAdmin;
  if (!isAdmin && quote.dealer_id !== session.user.id) { showError('You do not have permission to view this quote.'); return; }

  const { data: dealer } = await _supabase.from('dealers').select('*').eq('id', quote.dealer_id).single();
  let shippingAddr = null;
  if (quote.shipping_address_id) {
    const { data: addr } = await _supabase.from('addresses').select('*').eq('id', quote.shipping_address_id).single();
    shippingAddr = addr;
  }

  // ── Admin only: load return history ──
  if (isAdmin) {
    const { data: history, error: histErr } = await _supabase
      .from('quote_return_history')
      .select('*')
      .eq('quote_id', quote.id)
      .order('returned_at', { ascending: false });

    if (histErr) {
      console.warn('[init] Failed to load return history:', histErr);
      _returnHistory = [];
    } else {
      _returnHistory = history || [];

      const adminIds = [...new Set(_returnHistory.map(h => h.returned_by))];
      if (adminIds.length > 0) {
        const { data: admins } = await _supabase
          .from('dealers')
          .select('id, contact_name, email')
          .in('id', adminIds);
        const adminMap = {};
        (admins || []).forEach(a => { adminMap[a.id] = a; });
        _returnHistory.forEach(h => {
          h._returnedByInfo = adminMap[h.returned_by] || null;
        });
      }
    }
  }

  // F4.1 v2: reconstruct sub_groups from flat quote_items rows
  _groupedItems = reconstructGroupedItems(quote.quote_items || []);

  // CB-5 需求1: 載入 door_styles(整單 lead time;quote_items 沒有 construction_type/is_stock)
  // CB-9: 同時載入 skus_framed / skus_frameless 的 tag(Order List Tag 欄查表用)。
  //       不加 active 篩選,避免已下架但仍在舊報價裡的 SKU 查不到 tag。
  const [styleRes, framedRes, framelessRes] = await Promise.all([
    _supabase.from('door_styles').select('style_code, construction_type, is_stock').eq('is_active', true),
    _supabase.from('skus_framed').select('sku_code, tag'),
    _supabase.from('skus_frameless').select('sku_code, tag'),
  ]);
  _allDoorStyles    = styleRes.data     || [];
  _allSkusFramed    = framedRes.data    || [];
  _allSkusFrameless = framelessRes.data || [];

  // F-CUSTOM (Phase 5): debug log for custom item count
  const customCount = _groupedItems.filter(i => i.is_custom).length;
  if (customCount > 0) {
    console.log('[F-CUSTOM] quote-detail: ' + customCount + ' custom item(s) in this quote');
  }

  // Store for PDF
  _quote = quote; _dealer = dealer; _addr = shippingAddr;
  renderQuote(quote, dealer, shippingAddr);
}

// ── Return History 區塊 HTML(admin only)──
function buildReturnHistoryHtml() {
  if (!_isAdmin) return '';
  if (!_returnHistory || _returnHistory.length === 0) return '';

  const eventsHtml = _returnHistory.map(h => {
    const adminInfo  = h._returnedByInfo;
    const adminLabel = adminInfo
      ? (adminInfo.contact_name || adminInfo.email || 'Unknown admin')
      : 'Unknown admin';

    return `
      <div class="return-event">
        <div class="return-event-head">
          <span class="return-event-version">v${h.revision_at_return}</span>
          <span>Revision requested by</span>
          <span class="return-event-by">${escapeHtml(adminLabel)}</span>
          <span class="return-event-time">${formatDateTime(h.returned_at)}</span>
        </div>
        <div class="return-event-reason">${escapeHtml(h.return_reason || '—')}</div>
      </div>`;
  }).join('');

  const count = _returnHistory.length;
  return `
    <div class="return-history" id="returnHistorySection">
      <div class="return-history-header" onclick="toggleReturnHistory()">
        <div class="return-history-title">
          <svg viewBox="0 0 24 24"><path d="M13 3a9 9 0 00-9 9H1l3.89 3.89.07.14L9 12H6c0-3.87 3.13-7 7-7s7 3.13 7 7-3.13 7-7 7c-1.93 0-3.68-.79-4.94-2.06l-1.42 1.42A8.954 8.954 0 0013 21a9 9 0 000-18zm-1 5v5l4.28 2.54.72-1.21-3.5-2.08V8H12z"/></svg>
          Revision History
          <span class="return-history-count">${count} event${count !== 1 ? 's' : ''}</span>
        </div>
        <span class="return-history-toggle">
          <span id="returnHistoryToggleText">Show</span>
          <svg viewBox="0 0 24 24"><path d="M7 10l5 5 5-5z"/></svg>
        </span>
      </div>
      <div class="return-history-body">
        <div style="font-size:11px;color:var(--muted);font-style:italic;margin-bottom:12px;">
          Internal record — only visible to admins. Dealers cannot see this history.
        </div>
        ${eventsHtml}
      </div>
    </div>`;
}

function toggleReturnHistory() {
  const el = document.getElementById('returnHistorySection');
  if (!el) return;
  const isOpen = el.classList.toggle('open');
  const txt = document.getElementById('returnHistoryToggleText');
  if (txt) txt.textContent = isOpen ? 'Hide' : 'Show';
}

function renderQuote(quote, dealer, addr) {
  const sc    = statusClass[quote.status] || 'pending';
  // CB-2: display-only label; falls back to raw DB status for all other values.
  const statusText = statusLabel[quote.status] || quote.status;
  const isReturned = quote.status === 'Returned';

  // Back link target — admin → admin-quotes, dealer → quotes
  const backHref  = _isAdmin ? 'admin-quotes.html' : 'quotes.html';
  const backLabel = _isAdmin ? '← Back to Quotes' : '← Back to My Quotes';
  const backLinkHtml = `<a href="${backHref}" class="back-link">${backLabel}</a>`;

  // C1: detect pending shipping for display logic
  const pendingShipping = isPendingShipping(quote);

  // C1: admin edit shipping permission (pickup excluded)
  const canAdminEditShipping = _isAdmin
    && SHIPPING_EDIT_ALLOWED_STATUSES.includes(quote.status)
    && quote.logistic_type !== 'pickup';

  // ─────────────────────────────────────────────────────────────────────
  // CB-4: Admin "Edit" button — entry point for the new revision flow.
  //
  // Shows when admin views a Pending or Returned quote. Clicking takes
  // admin to Step 1 in admin-edit mode, where edits are buffered in
  // sessionStorage until Step 3's "Request Revision" writes to DB.
  //
  // Pending  → admin edits a freshly-submitted PO, then Request Revision
  // Returned → admin re-edits a previously-returned PO (customer asked
  //            for more changes after dealer was about to resubmit)
  // ─────────────────────────────────────────────────────────────────────
  const canAdminEdit = _isAdmin && ADMIN_EDIT_ALLOWED_STATUSES.includes(quote.status);
  const adminEditButtonHtml = canAdminEdit ? `
    <a href="new-quote.html?draft=${quote.id}&mode=admin-edit" class="btn-action admin-edit">
      <svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04a1 1 0 000-1.41l-2.34-2.34a1 1 0 00-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg>
      Edit
    </a>` : '';

  const shippingHtml = addr
    ? `<strong>${escapeHtml(addr.recipient_name || dealer?.company_name)}</strong><br>${escapeHtml(addr.address_line)}<br>${addr.address_line2 ? escapeHtml(addr.address_line2)+'<br>' : ''}${escapeHtml(addr.city)}, ${escapeHtml(addr.state)} ${escapeHtml(addr.zip_code)}`
    : `<strong>${escapeHtml(dealer?.company_name || '—')}</strong><br>${escapeHtml(dealer?.address_line1 || '')}<br>${dealer?.address_line2 ? escapeHtml(dealer.address_line2)+'<br>' : ''}${escapeHtml(dealer?.city || '')}, ${escapeHtml(dealer?.state || '')} ${escapeHtml(dealer?.zip_code || '')}`;

  // ─────────────────────────────────────────────────────────────────────
  // F4.1 v2: Build items table (11-col) + Notes table from grouped items
  // ─────────────────────────────────────────────────────────────────────
  let itemsTableHtml;
  let notesTableHtml = '';
  if (_groupedItems && _groupedItems.length) {
    const result = buildItemRowsHtml(_groupedItems);
    itemsTableHtml = result.rowsHtml;
    notesTableHtml = renderNotesTable(result.notes);
  } else {
    itemsTableHtml = `<tr><td colspan="10" style="text-align:center;padding:24px;color:var(--muted);">No items.</td></tr>`;
  }

  // CB-5 需求1: 整單 lead time(顯示在 items 表格正下方)
  const leadTimeHtml = buildLeadTimeHtml(_groupedItems, _allDoorStyles);

  // ─────────────────────────────────────────────────────────────────────
  // F-TAX + F-PROMOTIONS: Calculate totals for display.
  //
  // quotes.subtotal is the PRE-discount SKU subtotal (raw, per step3 spec).
  // quotes.grand_total is the POST-discount final figure (snapshot).
  // We recompute mod totals live for DISPLAY consistency, and recompute
  // promo discount live from quote_items.style_code so quote-detail's UI
  // shows the discount row in line with email/PDF.
  //
  // We do NOT recompute tax — that was snapshotted at submit time using the
  // PROMOTIONS const that was active back then. Recomputing now could disagree
  // with the snapshot if PROMOTIONS has been edited since. The snapshot wins.
  // ─────────────────────────────────────────────────────────────────────
  const skuSubtotal       = parseFloat(quote.subtotal || 0);
  const modsSubtotal      = _groupedItems ? calcTotalModsCost(_groupedItems) : 0;
  const taxableMods       = _groupedItems ? calcTaxableModsCost(_groupedItems) : 0;
  const nonTaxableMods    = modsSubtotal - taxableMods;

  // F-PROMOTIONS: compute discount live for UI display
  const promoResult = _groupedItems
    ? calculatePromotionDiscount(groupedItemsToPromoShape(_groupedItems))
    : { totalDiscount: 0, matchedLineCount: 0, appliedPromo: null };
  const promoDiscount     = promoResult.totalDiscount;
  const promoLabel        = promoResult.appliedPromo ? promoResult.appliedPromo.label : '';
  const promoMatchedCount = promoResult.matchedLineCount;

  if (promoDiscount > 0) {
    console.log('[F-PROMO] quote-detail: ' + (promoResult.appliedPromo ? promoResult.appliedPromo.id : '?')
      + ' matched ' + promoMatchedCount + ' line(s), discount=$' + promoDiscount.toFixed(2));
  }

  // Assemble breakdown by type
  const byType = {};
  (quote.quote_items || []).forEach(i => {
    if ((i.assemble_status || '').toLowerCase() !== 'assembled' || !i.assemble_fee) return;
    const t = (i.sku_type || 'OTHER').toUpperCase();
    if (!byType[t]) byType[t] = { qty: 0, total: 0 };
    byType[t].qty   += i.quantity;
    byType[t].total += parseFloat(i.assemble_fee) * i.quantity;
  });
  const assembleTotal = parseFloat(quote.assemble_total || 0);
  // F-COL-ABBREVIATIONS: use shortType() for the by-type breakdown labels
  const asmBreakdownHtml = assembleTotal > 0
    ? `<div class="total-row" style="flex-direction:column;align-items:stretch;gap:0;">
        <div style="display:flex;justify-content:space-between;padding-bottom:4px;">
          <span class="total-label">Assemble Fee</span><span class="total-val" style="color:#8B6914;">+${fmt(assembleTotal)}</span>
        </div>
        <div class="asm-breakdown">
          ${TYPE_ORDER.filter(t=>byType[t]).map(t=>
            `<div class="asm-breakdown-row"><span>${shortType(t)} ×${byType[t].qty}</span><span>+${fmt(byType[t].total)}</span></div>`
          ).join('')}
        </div>
      </div>`
    : '';

  // F4.1 v2: Modifications row (only show if > 0)
  const modsRowHtml = modsSubtotal > 0
    ? `<div class="total-row">
        <span class="total-label">Modifications</span>
        <span class="total-val" style="color:#8B6914;">+${fmt(modsSubtotal)}</span>
      </div>`
    : '';

  // F-PROMOTIONS: Discount row, placed right after Subtotal
  const discountRowHtml = promoDiscount > 0
    ? `<div class="total-row discount">
        <div>
          <span class="total-label">${escapeHtml(promoLabel || 'Promo Discount')}</span>
          ${promoMatchedCount > 0
            ? `<div class="discount-sublabel">${promoMatchedCount} eligible line${promoMatchedCount === 1 ? '' : 's'}</div>`
            : ''}
        </div>
        <span class="total-val">−${fmt(promoDiscount)}</span>
      </div>`
    : '';

  // C1: Shipping row — handle pending case + admin edit link
  const freeShip  = !pendingShipping && parseFloat(quote.shipping_cost) === 0 && parseFloat(quote.subtotal) > 0;
  const taxExempt = parseFloat(quote.tax_amount) === 0 && !!(dealer && dealer.tax_exempt);

  const editLinkLabel = pendingShipping ? 'Set Fee' : 'Edit Fee';
  const adminEditLink = canAdminEditShipping
    ? `<span class="admin-edit-link" onclick="openShippingEditor()">✎ ${editLinkLabel}</span>`
    : '';

  const existingShippingValue = (quote.shipping_cost === null || quote.shipping_cost === undefined)
    ? ''
    : parseFloat(quote.shipping_cost).toFixed(2);

  let shippingRowHtml;
  if (pendingShipping) {
    shippingRowHtml = `
      <div class="total-row">
        <span class="total-label">
          Shipping
          <span class="pending-tag">⚠ Awaiting Sales confirmation</span>
          ${adminEditLink}
        </span>
        <span class="total-val pending">Pending — Contact Sales Team</span>
      </div>`;
  } else {
    shippingRowHtml = `
      <div class="total-row">
        <span class="total-label">
          Shipping${freeShip ? ' <span class="free-tag">✓ Free</span>' : ''}
          ${adminEditLink}
        </span>
        <span class="total-val">${freeShip ? 'FREE' : fmt(quote.shipping_cost)}</span>
      </div>`;
  }

  const shippingEditorHtml = canAdminEditShipping ? `
    <div class="admin-shipping-editor" id="shippingEditor">
      <span class="editor-label">Set Shipping</span>
      <span class="editor-currency-prefix">$</span>
      <input type="number" id="shippingInput" min="0" step="0.01" placeholder="0.00" value="${existingShippingValue}"/>
      <button class="editor-btn save" id="shippingSaveBtn" onclick="saveShipping()">Save</button>
      <button class="editor-btn cancel" onclick="closeShippingEditor()">Cancel</button>
      <div class="editor-hint">
        Enter the shipping fee for this quote. Use 0 for free shipping. The dealer will see this value.
        After saving, return the quote so the dealer can review and resubmit.
      </div>
      <div class="editor-error" id="shippingEditorError" style="display:none;"></div>
    </div>` : '';

  // F-TAX: Tax row with taxable base detail (if partially taxable)
  let taxRowHtml;
  if (taxExempt) {
    taxRowHtml = `
      <div class="total-row">
        <span class="total-label">Tax <span class="exempt-tag">✓ Exempt</span></span>
        <span class="total-val">${fmt(quote.tax_amount)}</span>
      </div>`;
  } else {
    // Build tax detail note (if mods are partially taxable)
    // F-PROMOTIONS: tax base = (SKU - promo) + taxable mods, matching step3
    let taxDetailHtml = '';
    if (modsSubtotal > 0 && nonTaxableMods > 0.005) {
      const taxBase = (skuSubtotal - promoDiscount) + taxableMods;
      taxDetailHtml = `<div class="tax-note-detail">Taxable base: ${fmt(taxBase)} (excludes ${fmt(nonTaxableMods)} non-taxable mods)</div>`;
    }
    taxRowHtml = `
      <div class="total-row" style="flex-direction:column;align-items:stretch;gap:0;">
        <div style="display:flex;justify-content:space-between;">
          <span class="total-label">Tax</span>
          <span class="total-val">${fmt(quote.tax_amount)}</span>
        </div>
        ${taxDetailHtml}
      </div>`;
  }

  // C1: Pending grand total footnote
  const pendingFootnote = pendingShipping
    ? `<div class="pending-grand-note">* Shipping fee pending — final total will be confirmed by Sales</div>`
    : '';

  // ── Item 7: 依 status 渲染下載按鈕 ──
  let downloadButtonsHtml;
  if (quote.status === 'Draft') {
    downloadButtonsHtml = `
      <button class="btn-action" onclick="downloadDraftQuote()">
        <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zm-8 2V5h2v6h1.17L12 13.17 9.83 11H11zm-6 7h14v2H5v-2z"/></svg>
        Download Draft Quote
      </button>`;
  } else {
    downloadButtonsHtml = `
      <button class="btn-action secondary" onclick="downloadPackingList()">
        <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zm-8 2V5h2v6h1.17L12 13.17 9.83 11H11zm-6 7h14v2H5v-2z"/></svg>
        Download Packing List
      </button>
      <button class="btn-action" onclick="downloadInvoice()">
        <svg viewBox="0 0 24 24"><path d="M19 9h-4V3H9v6H5l7 7 7-7zm-8 2V5h2v6h1.17L12 13.17 9.83 11H11zm-6 7h14v2H5v-2z"/></svg>
        Download Invoice
      </button>`;
  }

  // ─────────────────────────────────────────────────────────────────────
  // CB-4: Returned banner — differs by viewer role.
  //
  // Dealer view: shows "Review & Resubmit" button → opens Step 1 in
  //              read-only review mode. Markup % remains editable in step3.
  // Admin view:  no button (admin uses the "Edit" button in the header to
  //              re-enter admin-edit mode if a further revision is needed).
  //              Banner becomes pure informational.
  // ─────────────────────────────────────────────────────────────────────
  let returnedBannerHtml = '';
  if (isReturned) {
    const reasonText = quote.return_reason
      ? escapeHtml(quote.return_reason)
      : '<span style="color:var(--muted);font-style:italic;">No reason provided.</span>';

    let bannerActionHtml = '';
    if (!_isAdmin) {
      // Dealer-facing: Review & Resubmit
      bannerActionHtml = `
        <a href="new-quote.html?draft=${quote.id}&mode=review" class="btn-action review-resubmit">
          <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
          Review &amp; Resubmit
        </a>`;
    } else {
      // Admin view: informational only. Edit button lives in the header.
      bannerActionHtml = `
        <span class="return-banner-meta">
          Revision was sent to the dealer. They will review and resubmit. To make further changes, use the Edit button above.
        </span>`;
    }

    returnedBannerHtml = `
      <div class="return-banner">
        <div class="return-icon-wrap">
          <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
        </div>
        <div class="return-banner-body">
          <div class="return-banner-title">Revision Requested</div>
          <div class="return-banner-msg">${reasonText}</div>
          <div class="return-banner-action">
            ${bannerActionHtml}
          </div>
        </div>
      </div>`;
  }

  // ── Return History（admin only）──
  const returnHistoryHtml = buildReturnHistoryHtml();

  document.getElementById('pageContent').innerHTML = `
    ${backLinkHtml}
    ${returnedBannerHtml}
    ${returnHistoryHtml}
    <div class="quote-header">
      <div>
        <div class="quote-number">${escapeHtml(quote.po_number||'—')}</div>
        <div class="quote-date">Submitted ${formatDate(quote.created_at)}</div>
      </div>
      <div class="header-right">
        <span class="status-badge ${sc}">${statusText}</span>
        ${adminEditButtonHtml}
        ${downloadButtonsHtml}
      </div>
    </div>

    <div class="card">
      <div class="card-header"><span class="card-title">Order Information</span></div>
      <div class="card-body">
        <div class="info-grid">
          <div><div class="info-label">PO Number</div><div class="info-value">${escapeHtml(quote.po_number||'—')}</div></div>
          <div><div class="info-label">Job Name</div><div class="info-value">${escapeHtml(quote.job_name||'—')}</div></div>
          <div><div class="info-label">Dealer</div><div class="info-value">${escapeHtml(dealer?.company_name||'—')}</div></div>
          <div><div class="info-label">Contact</div><div class="info-value">${escapeHtml(dealer?.contact_name||'—')}</div></div>
          <div><div class="info-label">Logistic</div><div class="info-value" style="text-transform:capitalize;">${escapeHtml(quote.logistic_type||'—')}</div></div>
          <div><div class="info-label">Status</div><div class="info-value"><span class="status-badge ${sc}" style="font-size:10px;">${statusText}</span></div></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header"><span class="card-title">Shipping Address</span></div>
      <div class="card-body"><div class="info-value">${shippingHtml}</div></div>
    </div>

    ${quote.notes ? `<div class="card"><div class="card-header"><span class="card-title">Notes</span></div><div class="card-body"><div class="info-value" style="font-style:italic;">${escapeHtml(quote.notes)}</div></div></div>` : ''}

    <div class="card">
      <div class="card-header"><span class="card-title">Items</span></div>
      <div style="overflow-x:auto;">

// C1: Admin shipping editor functions
// ─────────────────────────────────────────────────────────────────────────

function openShippingEditor() {
  const editor = document.getElementById('shippingEditor');
  if (!editor) return;
  editor.classList.add('show');
  const input = document.getElementById('shippingInput');
  if (input) {
    input.focus();
    input.select();
  }
  const errEl = document.getElementById('shippingEditorError');
  if (errEl) { errEl.style.display = 'none'; errEl.textContent = ''; }
}

function closeShippingEditor() {
  const editor = document.getElementById('shippingEditor');
  if (!editor) return;
  editor.classList.remove('show');
  const errEl = document.getElementById('shippingEditorError');
  if (errEl) { errEl.style.display = 'none'; errEl.textContent = ''; }
}

async function saveShipping() {
  if (!_isAdmin || !_quote) return;
  if (!SHIPPING_EDIT_ALLOWED_STATUSES.includes(_quote.status)) return;
  if (_quote.logistic_type === 'pickup') return;

  const input  = document.getElementById('shippingInput');
  const errEl  = document.getElementById('shippingEditorError');
  const saveBtn = document.getElementById('shippingSaveBtn');
  if (!input) return;

  const showError = (msg) => {
    if (errEl) { errEl.textContent = msg; errEl.style.display = 'block'; }
  };

  const raw = (input.value || '').trim();
  if (raw === '') {
    showError('Please enter a shipping fee. Use 0 for free shipping.');
    input.focus();
    return;
  }
  const newShipping = parseFloat(raw);
  if (isNaN(newShipping) || newShipping < 0) {
    showError('Please enter a valid non-negative number.');
    input.focus();
    return;
  }

  // F-PROMOTIONS bug fix (2026-05-21): grand_total recompute must subtract
  // promo discount. Previously, admin shipping edits silently re-inflated
  // grand_total by the discount amount, because subtotal here is the PRE-
  // discount value but the original grand_total was POST-discount.
  //
  // Formula: grand = subtotal - promoDiscount + modsTotal + assembleTotal
  //                  + newShipping + tax
  // We don't recompute tax — keep the snapshot (matches step3 behavior).
  const subtotal      = parseFloat(_quote.subtotal       || 0);
  const assembleTotal = parseFloat(_quote.assemble_total || 0);
  const taxAmount     = parseFloat(_quote.tax_amount     || 0);
  const modsTotal     = _groupedItems ? calcTotalModsCost(_groupedItems) : 0;

  // F-PROMOTIONS: compute discount the same way the rest of the page does
  const promoResult = _groupedItems
    ? calculatePromotionDiscount(groupedItemsToPromoShape(_groupedItems))
    : { totalDiscount: 0 };
  const promoDiscount = promoResult.totalDiscount;

  const newShippingRounded = parseFloat(newShipping.toFixed(2));
  const newGrand = parseFloat(
    (subtotal - promoDiscount + modsTotal + assembleTotal + newShippingRounded + taxAmount).toFixed(2)
  );

  console.log('[F-PROMO] saveShipping recompute:',
    'subtotal=$' + subtotal.toFixed(2),
    'promoDiscount=$' + promoDiscount.toFixed(2),
    'modsTotal=$' + modsTotal.toFixed(2),
    'assembleTotal=$' + assembleTotal.toFixed(2),
    'newShipping=$' + newShippingRounded.toFixed(2),
    'tax=$' + taxAmount.toFixed(2),
    'newGrand=$' + newGrand.toFixed(2)
  );

  saveBtn.disabled = true;
  saveBtn.textContent = 'Saving...';

  try {
    const { error } = await _supabase
      .from('quotes')
      .update({
        shipping_cost: newShippingRounded,
        grand_total:   newGrand,
      })
      .eq('id', _quote.id);

    if (error) throw error;

    _quote.shipping_cost = newShippingRounded;
    _quote.grand_total   = newGrand;
    renderQuote(_quote, _dealer, _addr);
  } catch (err) {
    console.error('[saveShipping] failed:', err);
    saveBtn.disabled = false;
    saveBtn.textContent = 'Save';
    showError(err.message || 'Failed to save. Please try again.');
  }
}

// ─────────────────────────────────────────────────────────────────────────
// PDF download functions
// F4.1 v2: pass sub_groups + modifications so PDF builder can render correctly
// F-PROMOTIONS (2026-05-21): pass _promo block so PDF shows discount row.
//
// F-HIDDEN-MODS (2026-05-18): We INTENTIONALLY do NOT filter MF01 No Skin
// here either. PDF builder applies its own _isHiddenMod() filter at render
// time, so we just pass through the raw modifications.
// ─────────────────────────────────────────────────────────────────────────

function buildQuoteDataForPdf() {
  // Build per-item structure with sub_groups, mirroring step3
  const items = (_groupedItems || []).map(function(item) {
    return {
      style_name:      item.style_name,
      style_code:      item.style_code,
      sku_code:        item.sku_code,
      sku_desc:        item.sku_desc || '',
      sku_type:        item.sku_type || null,
      assemble_status: item.assemble_status,
      quantity:        item.sub_groups.reduce((s, g) => s + (parseInt(g.qty, 10) || 0), 0),
      unit_price:      item.unit_price,
      msrp:            item.msrp || null,
      assemble_fee:    item.assemble_fee,
      sub_groups:      item.sub_groups,
      is_custom:       !!item.is_custom,
      tag:             getTagForItem(item),  // CB-9: 帶 tag 給 PDF
    };
  });

  const shippingCost = (_quote.shipping_cost === null || _quote.shipping_cost === undefined)
    ? null
    : parseFloat(_quote.shipping_cost);

  // F-TAX: compute mod totals from grouped items (live read from quote_items.modifications)
  const modsTotal        = _groupedItems ? calcTotalModsCost(_groupedItems) : 0;
  const taxableModsTotal = _groupedItems ? calcTaxableModsCost(_groupedItems) : 0;

  // F-PROMOTIONS: compute promo block live so pdf-builder can render Discount row
  const promoResult = _groupedItems
    ? calculatePromotionDiscount(groupedItemsToPromoShape(_groupedItems))
    : { totalDiscount: 0, matchedLineCount: 0, matchedSubtotal: 0, appliedPromo: null };

  // Tax rate: derive from snapshot. quote.subtotal is SKU-only (pre-discount).
  // At submit time, taxable base was (skuSubtotal - promoDiscount) + taxableModsTotal.
  // So effective rate = tax_amount / (post-discount taxable base).
  const skuSubtotal = parseFloat(_quote.subtotal || 0);
  const promoDiscount = promoResult.totalDiscount;
  const taxableBase = (skuSubtotal - promoDiscount) + taxableModsTotal;
  const taxAmount   = parseFloat(_quote.tax_amount || 0);
  const _taxRate    = (taxableBase > 0 && taxAmount > 0) ? (taxAmount / taxableBase) : 0;
  const _taxExempt  = taxAmount === 0 && !!(_dealer && _dealer.tax_exempt);

  return {
    po_number:     _quote.po_number || null,
    job_name:      _quote.job_name || null,
    status:        _quote.status,
    created_at:    _quote.created_at,
    logistic_type: _quote.logistic_type || 'pickup',
    delivery_fee:  parseFloat(_quote.delivery_fee || 0),
    shipping_cost: shippingCost,
    items:         items,
    modifications_total:         parseFloat(modsTotal.toFixed(2)),
    modifications_total_taxable: parseFloat(taxableModsTotal.toFixed(2)),
    _taxRate:      _taxRate,
    _taxExempt:    _taxExempt,
    _isPendingShipping: (_quote.logistic_type === 'shipping' && shippingCost === null),
    // F-PROMOTIONS: shape matches step3 buildQuoteDataForPdf._promo so pdf-builder
    // can render the discount row consistently. quote-detail never has markup,
    // so suppressed_by_markup is always false.
    _promo: {
      total_discount:       parseFloat(promoResult.totalDiscount.toFixed(2)),
      matched_line_count:   promoResult.matchedLineCount,
      matched_subtotal:     parseFloat(promoResult.matchedSubtotal.toFixed(2)),
      label:                promoResult.appliedPromo ? promoResult.appliedPromo.label : null,
      promo_id:             promoResult.appliedPromo ? promoResult.appliedPromo.id : null,
      suppressed_by_markup: false,
    },
  };
}

async function downloadDraftQuote() {
  if (!_quote || !_dealer) return;
  const quoteDataForPdf = buildQuoteDataForPdf();
  const doc = await ProCraftPDF.buildDraftQuotePdf(
    quoteDataForPdf, _dealer, _addr, { markupPercent: 0 }
  );
  const filename = ProCraftPDF.getPdfFilename('draft-quote', {
    poNumber:       _quote.po_number || 'Draft',
    dealerUid:      _dealer.uid,
    revisionNumber: _quote.revision_number || 1,
  });
  doc.save(filename);
}
