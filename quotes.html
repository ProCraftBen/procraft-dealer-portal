<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ProCraft — My Quotes</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --gold:#C9A84C; --gold-light:#E2C97E; --green-dark:#3e5a42; --green-mid:#4a6b4f;
      --cream:#F5F2EC; --text:#2C3A32; --muted:#7A8C82; --border:#DDD8CC; --bg:#F5F2EC; --white:#FFFFFF;
      --status-draft:#9B59B6;
      --status-pending:#C9A84C; --status-processing:#3B82F6; --status-complete:#16A34A; --status-closed:#6B7280;
    }
    html, body { min-height: 100%; font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text); }
    .navbar { background: var(--green-dark); padding: 0 24px; height: 60px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 100; }
    .nav-brand { display: flex; align-items: center; gap: 10px; }
    .nav-title { font-family: 'Cormorant Garamond', serif; font-size: 17px; font-weight: 500; letter-spacing: 0.12em; text-transform: uppercase; color: #fff; }
    .nav-right { display: flex; align-items: center; gap: 16px; }
    .nav-link { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.5); text-decoration: none; transition: color 0.2s; }
    .nav-link:hover, .nav-link.active { color: #fff; }
    .nav-logout { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: rgba(255,255,255,0.5); cursor: pointer; border: 1px solid rgba(255,255,255,0.15); border-radius: 3px; padding: 6px 12px; background: transparent; }
    .nav-logout:hover { color: #fff; }
    .hamburger { display: none; flex-direction: column; justify-content: center; gap: 5px; width: 36px; height: 36px; background: none; border: none; cursor: pointer; padding: 4px; }
    .hamburger span { display: block; width: 22px; height: 2px; background: rgba(255,255,255,0.7); border-radius: 2px; transition: all 0.25s; }
    .hamburger.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity: 0; }
    .hamburger.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
    .mobile-menu { display: none; position: fixed; top: 60px; left: 0; right: 0; background: #3e5a42; border-top: 1px solid rgba(255,255,255,0.08); z-index: 99; flex-direction: column; padding: 8px 0 16px; box-shadow: 0 8px 24px rgba(0,0,0,0.3); }
    .mobile-menu.show { display: flex; }
    .mobile-menu a, .mobile-menu button { display: block; width: 100%; padding: 12px 24px; font-size: 12px; letter-spacing: 0.12em; text-transform: uppercase; color: rgba(255,255,255,0.6); text-decoration: none; background: none; border: none; text-align: left; cursor: pointer; font-family: 'DM Sans', sans-serif; }
    .mobile-menu a:hover, .mobile-menu button:hover { color: #fff; background: rgba(255,255,255,0.05); }
    .mobile-menu a.active { color: #fff; }
    .mobile-menu .menu-divider { height: 1px; background: rgba(255,255,255,0.08); margin: 8px 0; }
    .nav-logo-img { height: 44px; max-width: 110px; object-fit: contain; }
    @media (max-width: 768px) { .nav-right { display: none !important; } .hamburger { display: flex !important; } .nav-logo-img { height: 36px; max-width: 90px; } }

    .page { max-width: 960px; margin: 0 auto; padding: 32px 20px 60px; }
    .page-header { margin-bottom: 24px; display: flex; align-items: flex-end; justify-content: space-between; flex-wrap: wrap; gap: 12px; }
    .page-title { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 400; color: var(--green-dark); }
    .page-sub { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .btn-new-quote { display: inline-flex; align-items: center; gap: 8px; background: var(--green-dark); color: #fff; border: none; border-radius: 3px; padding: 11px 18px; font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; cursor: pointer; transition: background 0.2s; text-decoration: none; }
    .btn-new-quote:hover { background: var(--green-mid); }
    .btn-new-quote svg { width: 13px; height: 13px; fill: currentColor; }

    /* Stats bar — 5 cards now */
    .stats-bar { display: grid; grid-template-columns: repeat(5, 1fr); gap: 12px; margin-bottom: 20px; }
    @media (max-width: 700px) { .stats-bar { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 420px) { .stats-bar { grid-template-columns: repeat(2, 1fr); } }
    .stat-card { background: var(--white); border: 1px solid var(--border); border-radius: 4px; padding: 14px 16px; }
    .stat-num { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 500; color: var(--green-dark); line-height: 1; }
    .stat-num.draft-num { color: var(--status-draft); }
    .stat-label { font-size: 9px; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); margin-top: 4px; }

    .filters { background: var(--white); border: 1px solid var(--border); border-radius: 4px; padding: 16px 20px; margin-bottom: 16px; display: flex; gap: 12px; flex-wrap: wrap; align-items: flex-end; }
    .filter-group { display: flex; flex-direction: column; gap: 5px; }
    .filter-label { font-size: 9px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); }
    .filter-select, .filter-input { height: 36px; border: 1px solid var(--border); border-radius: 3px; padding: 0 10px; font-family: 'DM Sans', sans-serif; font-size: 12px; color: var(--text); background: var(--white); outline: none; }
    .filter-input { width: 160px; }
    .filter-actions { display: flex; gap: 8px; margin-left: auto; align-self: flex-end; }
    .btn-filter { height: 36px; padding: 0 16px; background: var(--green-dark); color: #fff; border: none; border-radius: 3px; font-family: 'DM Sans', sans-serif; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; cursor: pointer; }
    .btn-filter:hover { background: var(--green-mid); }
    .btn-reset { height: 36px; padding: 0 14px; background: transparent; color: var(--muted); border: 1px solid var(--border); border-radius: 3px; font-family: 'DM Sans', sans-serif; font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase; cursor: pointer; }
    .btn-reset:hover { border-color: var(--text); color: var(--text); }

    .table-card { background: var(--white); border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
    .table-header { padding: 14px 20px; border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; }
    .table-title { font-size: 10px; font-weight: 500; letter-spacing: 0.2em; text-transform: uppercase; color: var(--green-dark); }
    .table-count { font-size: 11px; color: var(--muted); }
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    thead th { padding: 10px 16px; background: #F5F3EF; border-bottom: 1px solid var(--border); font-size: 9px; font-weight: 500; letter-spacing: 0.15em; text-transform: uppercase; color: var(--muted); text-align: left; white-space: nowrap; }
    thead th.r { text-align: right; }

    /* Regular rows — clickable */
    tbody tr.row-clickable { border-bottom: 1px solid var(--border); cursor: pointer; transition: background 0.15s; }
    tbody tr.row-clickable:hover { background: #FAFAF8; }

    /* Draft rows — not clickable on whole row */
    tbody tr.row-draft { border-bottom: 1px solid var(--border); background: rgba(155,89,182,0.03); transition: background 0.15s; }
    tbody tr.row-draft:hover { background: rgba(155,89,182,0.06); }

    tbody tr:last-child { border-bottom: none; }
    tbody td { padding: 14px 16px; font-size: 13px; vertical-align: middle; }
    tbody td.r { text-align: right; }
    .td-po { font-weight: 500; color: var(--green-dark); white-space: nowrap; }
    .td-job { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .td-date { font-size: 12px; color: var(--muted); white-space: nowrap; }
    .td-amount { font-weight: 500; white-space: nowrap; }
    .td-amount.draft-dash { color: var(--muted); font-style: italic; font-weight: 400; }

    .status-badge { display: inline-block; padding: 3px 10px; border-radius: 2px; font-size: 10px; font-weight: 500; letter-spacing: 0.08em; text-transform: uppercase; white-space: nowrap; }
    .status-badge.draft      { background: rgba(155,89,182,0.10); color: var(--status-draft); }
    .status-badge.pending    { background: rgba(201,168,76,0.12);  color: var(--status-pending); }
    .status-badge.processing { background: rgba(59,130,246,0.1);   color: var(--status-processing); }
    .status-badge.complete   { background: rgba(22,163,74,0.1);    color: var(--status-complete); }
    .status-badge.closed     { background: rgba(107,114,128,0.1);  color: var(--status-closed); }

    .arrow-cell { color: var(--border); font-size: 14px; text-align: right; }
    tbody tr.row-clickable:hover .arrow-cell { color: var(--gold); }

    /* Edit draft icon cell */
    .edit-draft-cell { text-align: right; }
    .btn-edit-draft {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: 11px; color: var(--status-draft);
      background: rgba(155,89,182,0.08);
      border: 1px solid rgba(155,89,182,0.25);
      border-radius: 3px; padding: 5px 10px;
      cursor: pointer; transition: all 0.15s;
      text-decoration: none; white-space: nowrap;
      font-family: 'DM Sans', sans-serif;
      letter-spacing: 0.05em;
    }
    .btn-edit-draft:hover { background: rgba(155,89,182,0.15); border-color: rgba(155,89,182,0.5); }

    .empty-state { padding: 60px 20px; text-align: center; color: var(--muted); }
    .empty-state svg { width: 36px; height: 36px; fill: var(--border); margin: 0 auto 12px; display: block; }
    .empty-state p { font-size: 13px; margin-bottom: 16px; }
    .loading-row { height: 52px; border-bottom: 1px solid var(--border); background: linear-gradient(90deg, #eee 25%, #f5f5f5 50%, #eee 75%); background-size: 200% 100%; animation: shimmer 1.2s infinite; }
    @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
  </style>
</head>
<body>

<nav class="navbar">
  <div class="nav-brand">
    <img class="nav-logo-img" src="https://acwgemgpnusworpxxoai.supabase.co/storage/v1/object/public/assets/ProCraft-DC-Logo-white.png" alt="ProCraft DC"/>
    <span class="nav-title">ProCraft DC</span>
  </div>
  <div class="nav-right">
    <a href="dashboard.html" class="nav-link">Dashboard</a>
    <a href="quotes.html" class="nav-link active">My Quotes</a>
    <a href="new-quote.html" class="nav-link">New Quote</a>
    <a href="dealer-profile.html" class="nav-link">Edit Profile</a>
    <a href="change-password.html" class="nav-link">Change Password</a>
    <button class="nav-logout" onclick="handleLogout()">Sign Out</button>
  </div>
  <button class="hamburger" id="hamburger" onclick="toggleMenu()">
    <span></span><span></span><span></span>
  </button>
</nav>

<div class="mobile-menu" id="mobileMenu">
  <a href="dashboard.html">Dashboard</a>
  <a href="quotes.html" class="active">My Quotes</a>
  <a href="new-quote.html">New Quote</a>
  <a href="dealer-profile.html">Edit Profile</a>
  <a href="change-password.html">Change Password</a>
  <div class="menu-divider"></div>
  <button onclick="handleLogout()">Sign Out</button>
</div>

<div class="page">
  <div class="page-header">
    <div>
      <div class="page-title">My Quotes</div>
      <div class="page-sub" id="pageSub">Loading...</div>
    </div>
    <a href="new-quote.html" class="btn-new-quote">
      <svg viewBox="0 0 24 24"><path d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
      New Quote
    </a>
  </div>

  <!-- Stats — 5 cards -->
  <div class="stats-bar">
    <div class="stat-card"><div class="stat-num" id="statTotal">—</div><div class="stat-label">Total</div></div>
    <div class="stat-card"><div class="stat-num draft-num" id="statDraft">—</div><div class="stat-label">Draft</div></div>
    <div class="stat-card"><div class="stat-num" id="statPending">—</div><div class="stat-label">Pending</div></div>
    <div class="stat-card"><div class="stat-num" id="statProcessing">—</div><div class="stat-label">Processing</div></div>
    <div class="stat-card"><div class="stat-num" id="statComplete">—</div><div class="stat-label">Complete</div></div>
  </div>

  <div class="filters">
    <div class="filter-group">
      <span class="filter-label">Status</span>
      <select class="filter-select" id="filterStatus">
        <option value="">All Statuses</option>
        <option value="Draft">Draft</option>
        <option value="Pending">Pending</option>
        <option value="Processing">Processing</option>
        <option value="Complete">Complete</option>
        <option value="Closed">Closed</option>
      </select>
    </div>
    <div class="filter-group">
      <span class="filter-label">From</span>
      <input type="date" class="filter-input" id="filterFrom" style="width:130px;"/>
    </div>
    <div class="filter-group">
      <span class="filter-label">To</span>
      <input type="date" class="filter-input" id="filterTo" style="width:130px;"/>
    </div>
    <div class="filter-group">
      <span class="filter-label">Search</span>
      <input type="text" class="filter-input" id="filterSearch" placeholder="PO# or Job Name"/>
    </div>
    <div class="filter-actions">
      <button class="btn-filter" onclick="applyFilters()">Filter</button>
      <button class="btn-reset" onclick="resetFilters()">Reset</button>
    </div>
  </div>

  <div class="table-card">
    <div class="table-header">
      <span class="table-title">Quotes</span>
      <span class="table-count" id="tableCount">—</span>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>PO # / Job Name</th>
            <th>Date</th>
            <th class="r">Total</th>
            <th>Status</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="quotesBody">
          <tr class="loading-row"><td colspan="5"></td></tr>
          <tr class="loading-row"><td colspan="5"></td></tr>
          <tr class="loading-row"><td colspan="5"></td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const { createClient } = window.supabase;
const _supabase = createClient(
  'https://acwgemgpnusworpxxoai.supabase.co',
  'sb_publishable_GYx1PEpxNJ9dj5V3WYpPWQ_8YfB0w8M'
);

let allQuotes = [];
let userId    = null;

const statusClass = {
  Draft: 'draft', Pending: 'pending', Processing: 'processing',
  Complete: 'complete', Closed: 'closed'
};

function toggleMenu() {
  const btn  = document.getElementById('hamburger');
  const menu = document.getElementById('mobileMenu');
  btn.classList.toggle('open');
  menu.classList.toggle('show');
}

document.addEventListener('click', function(e) {
  const btn  = document.getElementById('hamburger');
  const menu = document.getElementById('mobileMenu');
  if (btn && menu && !btn.contains(e.target) && !menu.contains(e.target)) {
    btn.classList.remove('open');
    menu.classList.remove('show');
  }
});

function fmt(n) { return '$' + parseFloat(n || 0).toFixed(2); }
function formatDate(str) {
  return new Date(str).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

async function init() {
  const { data: { session } } = await _supabase.auth.getSession();
  if (!session) { window.location.href = 'login.html'; return; }
  userId = session.user.id;

  const { data: me } = await _supabase.from('dealers').select('role, is_active, company_name').eq('id', userId).single();
  if (!me?.is_active) { await _supabase.auth.signOut(); window.location.href = 'login.html'; return; }
  if (['admin','super_admin'].includes(me?.role)) { window.location.href = 'admin.html'; return; }

  document.getElementById('pageSub').textContent = me?.company_name || '';
  await loadQuotes();

  setInterval(async () => {
    const { data: check } = await _supabase.from('dealers').select('is_active').eq('id', userId).single();
    if (!check?.is_active) { await _supabase.auth.signOut(); window.location.href = 'login.html'; }
  }, 60000);
}

async function loadQuotes() {
  const { data: quotes, error } = await _supabase
    .from('quotes')
    .select('*')
    .eq('dealer_id', userId)
    .order('created_at', { ascending: false });

  if (error) { console.error('loadQuotes error:', error); return; }
  allQuotes = quotes || [];
  updateStats();
  renderTable(allQuotes);
}

function updateStats() {
  document.getElementById('statTotal').textContent      = allQuotes.length;
  document.getElementById('statDraft').textContent      = allQuotes.filter(q => q.status === 'Draft').length;
  document.getElementById('statPending').textContent    = allQuotes.filter(q => q.status === 'Pending').length;
  document.getElementById('statProcessing').textContent = allQuotes.filter(q => q.status === 'Processing').length;
  document.getElementById('statComplete').textContent   = allQuotes.filter(q => q.status === 'Complete').length;
}

function renderTable(quotes) {
  const tbody = document.getElementById('quotesBody');
  document.getElementById('tableCount').textContent = `${quotes.length} quote${quotes.length !== 1 ? 's' : ''}`;

  if (!quotes.length) {
    tbody.innerHTML = `
      <tr><td colspan="5">
        <div class="empty-state">
          <svg viewBox="0 0 24 24"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8l-6-6zm-1 1.5L18.5 9H13V3.5zM6 20V4h5v7h7v9H6z"/></svg>
          <p>No quotes found.</p>
          <a href="new-quote.html" class="btn-new-quote" style="display:inline-flex;">+ New Quote</a>
        </div>
      </td></tr>`;
    return;
  }

  tbody.innerHTML = quotes.map(q => {
    const sc      = statusClass[q.status] || 'pending';
    const isDraft = q.status === 'Draft';

    if (isDraft) {
      // Draft row — whole row NOT clickable, only the Edit button
      return `
        <tr class="row-draft">
          <td>
            <div class="td-po">${q.po_number || '—'}</div>
            <div class="td-job">${q.job_name || '—'}</div>
          </td>
          <td class="td-date">${formatDate(q.created_at)}</td>
          <td class="td-amount draft-dash r">—</td>
          <td><span class="status-badge ${sc}">${q.status}</span></td>
          <td class="edit-draft-cell">
            <a class="btn-edit-draft" href="new-quote.html?draft=${q.id}">✎ Continue</a>
          </td>
        </tr>`;
    }

    // Regular row — whole row clickable
    return `
      <tr class="row-clickable" onclick="window.location.href='quote-detail.html?id=${q.id}'">
        <td>
          <div class="td-po">${q.po_number || '—'}</div>
          <div class="td-job">${q.job_name || '—'}</div>
        </td>
        <td class="td-date">${formatDate(q.created_at)}</td>
        <td class="td-amount r">${fmt(q.grand_total)}</td>
        <td><span class="status-badge ${sc}">${q.status}</span></td>
        <td class="arrow-cell">→</td>
      </tr>`;
  }).join('');
}

function applyFilters() {
  const status = document.getElementById('filterStatus').value;
  const from   = document.getElementById('filterFrom').value;
  const to     = document.getElementById('filterTo').value;
  const search = document.getElementById('filterSearch').value.trim().toLowerCase();

  let filtered = allQuotes;
  if (status) filtered = filtered.filter(q => q.status === status);
  if (from)   filtered = filtered.filter(q => q.created_at >= from);
  if (to)     filtered = filtered.filter(q => q.created_at <= to + 'T23:59:59');
  if (search) filtered = filtered.filter(q =>
    (q.po_number || '').toLowerCase().includes(search) ||
    (q.job_name  || '').toLowerCase().includes(search)
  );

  renderTable(filtered);
}

function resetFilters() {
  document.getElementById('filterStatus').value = '';
  document.getElementById('filterFrom').value   = '';
  document.getElementById('filterTo').value     = '';
  document.getElementById('filterSearch').value = '';
  renderTable(allQuotes);
}

async function handleLogout() {
  await _supabase.auth.signOut();
  window.location.href = 'login.html';
}

init();
</script>
</body>
</html>
